// ── Küpe Okuma ──
function EarTagScanner({ onResult, onClose }) {
  const [scanning, setScanning] = useState(false);
  const [preview,  setPreview]  = useState(null);
  const [result,   setResult]   = useState("");
  const [err,      setErr]      = useState("");
  const fileRef = useRef();
  const camRef  = useRef();

  const processImage = async (file) => {
    setScanning(true); setErr(""); setResult("");
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(",")[1];
      setPreview(e.target.result);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:100,
            messages:[{
              role:"user",
              content:[
                { type:"image", source:{ type:"base64", media_type:file.type||"image/jpeg", data:base64 } },
                { type:"text", text:"Bu görselde bir hayvan küpe etiketi var. Küpe üzerindeki numaranın son 4 rakamını bul ve sadece şu formatta yaz: TR-15-XXXX (son 4 hane). Eğer tam numarayı okuyabiliyorsan TR-XX-XXXX formatında yaz. Sadece numarayı yaz, başka hiçbir şey yazma. Numara göremiyorsan sadece 'bulunamadı' yaz." }
              ]
            }]
          })
        });
        const data = await res.json();
        const text = (data.content?.[0]?.text||"").trim();
        if (text && text!=="bulunamadı" && text.length>=4) {
          setResult(text);
        } else {
          setErr("Numara okunamadı. Daha yakından veya net bir fotoğraf deneyin.");
        }
      } catch(e) { setErr("Bağlantı hatası. İnternet bağlantınızı kontrol edin."); }
      setScanning(false);
    };
    reader.readAsDataURL(file);
  };

  return <ModalWrap title="📷 Küpe Numarası Oku" onClose={onClose}>
    <div style={{textAlign:"center",padding:"4px 0"}}>
      <div style={{fontSize:12,color:"#8c8c7e",marginBottom:10}}>Kamera ile çekin veya galeriden seçin</div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <button onClick={()=>camRef.current.click()} style={{...S.btnPrimary,flex:1,fontSize:13}}>📷 Kamera</button>
        <button onClick={()=>fileRef.current.click()} style={{...S.btnOutline,flex:1,fontSize:13}}>🖼 Galeri</button>
      </div>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>e.target.files[0]&&processImage(e.target.files[0])}/>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&processImage(e.target.files[0])}/>
      {preview && <img src={preview} style={{width:"100%",borderRadius:10,marginBottom:8,maxHeight:180,objectFit:"cover"}} alt="preview"/>}
      {scanning && <div style={{color:"#4A7C3F",fontWeight:700,fontSize:13,padding:10}}>🔍 Numara okunuyor...</div>}
      {err && <ErrBox msg={err}/>}
      {result && <div style={{background:"#E3F0DC",borderRadius:10,padding:12,marginTop:8}}>
        <div style={{fontSize:11,color:"#3D5A25",marginBottom:4}}>✅ Okunan numara:</div>
        <div style={{fontSize:20,fontWeight:900,color:"#3D5A25",letterSpacing:1}}>{result}</div>
        <button onClick={()=>onResult(result)} style={{...S.btnPrimary,width:"100%",marginTop:10,fontSize:13}}>Bu numarayı kullan</button>
      </div>}
    </div>
    <button onClick={onClose} style={{...S.btnOutline,width:"100%"}}>İptal</button>
  </ModalWrap>;
}

function HealthDetailModal({ record, goat, logs, onUpdate, onClose, onFinalize, currentUser, onLogsUpdate }) {
  const [status,    setStatus]    = useState(record.status);
  const [treatment, setTreatment] = useState(record.treatment||"");
  const [notes,     setNotes]     = useState(record.notes||"");
  const [cost,      setCost]      = useState(record.cost||"");
  const [saving,    setSaving]    = useState(false);
  const [showClose, setShowClose] = useState(false);
  const [closeReason, setCloseReason] = useState("");
  const [closeNote,   setCloseNote]   = useState("");
  const [tab, setTab] = useState("detay");
  const [treatmentChanged, setTreatmentChanged] = useState(false);

  const recLogs = logs.filter(l=>l.healthRecordId===record.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const save = async () => {
    setSaving(true);
    const changes = [];
    if (status!==record.status) changes.push(`Durum değişti: "${record.status}" → "${status}"`);
    if (treatment!==record.treatment) changes.push(`Tedavi güncellendi`);
    if (cost!==record.cost && cost) changes.push(`Maliyet: ${cost}₺`);
    if (notes!==record.notes && notes) changes.push(`Not eklendi`);
    const { error } = await sb.from("health_records").update({ status, treatment, notes, cost }).eq("id", record.id);
    if (!error) {
      const detail = changes.length>0 ? changes.join(" · ") : "Kayıt güncellendi";
      await addLog(record.id, goat.id, goat.breed, "güncelleme", detail, currentUser);
      const newLog = { id:"l"+Date.now(), healthRecordId:record.id, goatId:goat.id, breed:goat.breed, action:"güncelleme", actionDetail:detail, userName:currentUser, createdAt:new Date().toISOString() };
      onLogsUpdate(newLog);
      onUpdate({ ...record, status, treatment, notes, cost });
    }
    setSaving(false);
  };

  const finalize = async () => {
    if (!closeReason) return;
    setSaving(true);
    const report = {
      id:"r"+Date.now(), goatId:goat.id, goatName:goat.name, goatEarTag:goat.earTag, breed:goat.breed,
      dateStarted:record.date, dateClosed:todayISO(), condition:record.condition,
      treatment, closeReason, closeNote, veterinarian:record.veterinarian, cost, createdByName:currentUser, notes
    };
    await sb.from("health_records").update({ closed:true, status:closeReason==="Hayvan Öldü"?"öldü":"iyileşti" }).eq("id", record.id);
    await sb.from("reports").insert(fromReport(report));
    await addLog(record.id, goat.id, goat.breed, "sonlandırma", `Neden: ${closeReason}${closeNote?" — "+closeNote:""}`, currentUser);
    onFinalize(record.id, report);
    setSaving(false);
  };

  if (showClose) return <ModalWrap title="📋 Kaydı Sonlandır" onClose={()=>setShowClose(false)}>
    <div style={{background:"#FFF8EC",border:"1px solid #F0D49A",borderRadius:10,padding:10,fontSize:12,color:"#8B5A1B"}}>
      ⚠️ Bu kayıt sonlandırılacak ve rapor bölümüne taşınacak.
    </div>
    <FL>Sonlandırma Nedeni *</FL>
    <select value={closeReason} onChange={e=>setCloseReason(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CLOSE_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
    </select>
    <FL>Ek Not</FL>
    <textarea value={closeNote} onChange={e=>setCloseNote(e.target.value)} rows={3} style={{...S.input,resize:"vertical",lineHeight:1.5}} placeholder="Sonuç hakkında not..."/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={()=>setShowClose(false)} style={{...S.btnOutline,flex:1,padding:12}}>Geri</button>
      <button onClick={finalize} disabled={!closeReason||saving} style={{...S.btnPrimary,flex:2,padding:12,background:"#BE3B31",opacity:(!closeReason||saving)?.5:1}}>{saving?"Kaydediliyor...":"✅ Sonlandır"}</button>
    </div>
  </ModalWrap>;

  return <ModalWrap title={`🩺 ${record.condition}`} onClose={onClose}>
    <div style={{background:"#F5F3ED",borderRadius:10,padding:10,fontSize:12}}>
      <b>{goat.name}</b> · 🏷 {goat.earTag} · Başlangıç: {fmt(record.date)}
    </div>
    <div style={{display:"flex",background:"#F2F0EA",borderRadius:8,overflow:"hidden",marginTop:4}}>
      {[["detay","✏️ Güncelle"],["gecmis","📋 Geçmiş"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab===k?"#4A7C3F":"transparent",color:tab===k?"#fff":"#8c8c7e"}}>{l}</button>
      ))}
    </div>

    {tab==="detay" && <>
      <FL>Durum</FL>
      <StatusPicker value={status} onChange={setStatus}/>
      <FL>Tedavi / Yapılan İşlem</FL>
      {/* Aynı tedavi devam ediyorsa checkbox */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#F5FAF0",borderRadius:8,border:"1px solid #D4E8C2"}}>
        <input type="checkbox" id="sameTreatment" checked={!treatmentChanged}
          onChange={e=>setTreatmentChanged(!e.target.checked)}
          style={{width:16,height:16,cursor:"pointer"}}/>
        <label htmlFor="sameTreatment" style={{fontSize:12,color:"#3D5A25",fontWeight:600,cursor:"pointer"}}>
          Aynı tedavi devam ediyor (değişiklik yok)
        </label>
      </div>
      <textarea value={treatment} onChange={e=>{setTreatment(e.target.value);setTreatmentChanged(true);}} rows={3}
        style={{...S.input,resize:"vertical",lineHeight:1.5,opacity:treatmentChanged?1:.7}}
        placeholder="İlaç, doz, işlem..."/>
      <FL>Maliyet (₺)</FL>
      <input type="number" value={cost} onChange={e=>setCost(e.target.value)} style={S.input} placeholder="0"/>
      <FL>Notlar</FL>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setShowClose(true)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",padding:"10px 14px",fontSize:12}}>📋 Sonlandır</button>
        <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:1,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Güncelle"}</button>
      </div>
    </>}

    {tab==="gecmis" && <div>
      {recLogs.length===0 && <Empty text="Henüz işlem geçmişi yok"/>}
      {recLogs.map((l,i)=>(
        <div key={l.id} style={{display:"flex",gap:8,padding:"10px 0",borderBottom:i<recLogs.length-1?"1px solid #F2F0EA":"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:l.action==="sonlandırma"?"#FFF0EE":l.action==="açılış"?"#E3F0DC":"#EEF6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1e1e1e"}}>{l.userName}</div>
              <div style={{fontSize:10,color:"#aaa",textAlign:"right"}}>{fmtDT(l.createdAt)}</div>
            </div>
            <div style={{fontSize:11,color:"#555",marginTop:2,background:"#F9F9F6",padding:"4px 8px",borderRadius:6}}>{l.actionDetail}</div>
          </div>
        </div>
      ))}
    </div>}
  </ModalWrap>;
}

function HealthModal({ goats, breedFilter, onSave, onClose, preGoatId, currentUser }) {
  const filtered = breedFilter ? goats.filter(g=>g.breed===breedFilter&&!g.archived) : goats.filter(g=>!g.archived);
  const [goatId,setGoatId]=useState(preGoatId||"");
  const [date,setDate]=useState(todayISO());
  const [condition,setCondition]=useState("");
  const [condCustom,setCondCustom]=useState("");
  const [treatment,setTreatment]=useState("");
  const [status,setStatus]=useState("tedavi_altında");
  const [cost,setCost]=useState("");
  const [notes,setNotes]=useState("");
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);

  const save = async () => {
    if (!goatId){setErr("Keçi seçiniz");return;}
    const cond = condition==="Diğer"?condCustom.trim():condition;
    if (!cond){setErr("Hastalık/durum giriniz");return;}
    setSaving(true);
    const g = goats.find(x=>x.id===goatId);
    const rec = { id:"h"+Date.now(), goatId, breed:g.breed, date, condition:cond, treatment, status, veterinarian:currentUser, cost, createdByName:currentUser, notes };
    const { error } = await sb.from("health_records").insert(fromHealth(rec));
    if (error){setErr("Kayıt hatası: "+error.message);setSaving(false);return;}
    await addLog(rec.id, goatId, g.breed, "açılış", `${cond} — ${currentUser} tarafından açıldı`, currentUser);
    onSave(rec);
  };

  return <ModalWrap title="🩺 Sağlık Kaydı Ekle" onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Keçi *</FL>
    <select value={goatId} onChange={e=>setGoatId(e.target.value)} style={S.select}>

function VaccineModal({ breed, goats, onSave, onClose, currentUser }) {
  const breedGoats=goats.filter(g=>g.breed===breed.id&&!g.archived);
  const anacList=breedGoats.filter(g=>g.category==="anac");
  const oglakList=breedGoats.filter(g=>g.category==="oglak");
  const [vaccineType,setVaccineType]=useState("");
  const [date,setDate]=useState(todayISO());
  const [batchNo,setBatchNo]=useState("");
  const [selected,setSelected]=useState(new Set(breedGoats.map(g=>g.id)));
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const toggle=id=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleGroup=list=>{const allSel=list.every(g=>selected.has(g.id));setSelected(prev=>{const s=new Set(prev);list.forEach(g=>allSel?s.delete(g.id):s.add(g.id));return s;});};
  const save=async()=>{
    if(!vaccineType){setErr("Aşı türü seçiniz");return;}
    if(selected.size===0){setErr("En az bir hayvan seçin");return;}
    setSaving(true);
    const records=[...selected].map(goatId=>({id:"v"+Date.now()+goatId,goatId,breed:breed.id,date,vaccineType,batchNo,createdByName:currentUser}));
    const {error}=await sb.from("vaccines").insert(records.map(fromVaccine));
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave(records);
  };
  const GoatRow=({g})=>{const sel=selected.has(g.id);return <div onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E8E5DC"}`,cursor:"pointer",marginBottom:4}}>
    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#ccc"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}</div>
    <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#444"}}>{g.name}</span>
    <span style={{fontSize:10,color:"#8c8c7e",marginLeft:"auto"}}>{g.earTag}</span>
  </div>;};
  return <ModalWrap title={`💉 Toplu Aşı — ${breed.emoji} ${breed.name}`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}><option value="">— Seçin —</option>{VACCINE_DEFS.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select>
    <FL>Tarih *</FL><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Parti / Seri No</FL><input value={batchNo} onChange={e=>setBatchNo(e.target.value)} style={S.input} placeholder="örn. ENT-2026-A12"/>
    <FL>Hayvan Seçimi ({selected.size}/{breedGoats.length} seçili)</FL>
    {anacList.length>0&&<>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:700,color:"#3D5A25"}}>🐐 Anaçlar</span>
        <button onClick={()=>toggleGroup(anacList)} style={{...S.btnSm,background:"#E3F0DC",color:"#3D5A25",fontSize:10}}>{anacList.every(g=>selected.has(g.id))?"Tümünü Kaldır":"Tümünü Seç"}</button>
      </div>
      {anacList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    {oglakList.length>0&&<div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:700,color:"#8B5A1B"}}>🍼 Oğlaklar</span>
        <button onClick={()=>toggleGroup(oglakList)} style={{...S.btnSm,background:"#FFF4E6",color:"#8B5A1B",fontSize:10}}>{oglakList.every(g=>selected.has(g.id))?"Tümünü Kaldır":"Tümünü Seç"}</button>
      </div>
      {oglakList.map(g=><GoatRow key={g.id} g={g}/>)}
    </div>}
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💉 "+selected.size+" Hayvana Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function AddGoatModal({ breed, onSave, onClose, currentUser }) {
  const [name,setName]=useState("");
  const [earTag,setEarTag]=useState("");
  const [gender,setGender]=useState("dişi");
  const [category,setCategory]=useState("anac");
  const [birthDate,setBirthDate]=useState("");
  const [weight,setWeight]=useState("");
  const [color,setColor]=useState("");
  const [notes,setNotes]=useState("");
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const [showScanner,setShowScanner]=useState(false);

  const save=async()=>{
    if(!name){setErr("İsim giriniz");return;}
    if(!earTag){setErr("Küpe no giriniz");return;}
    setSaving(true);
    const g={id:"g"+Date.now(),name,earTag,gender,breed:breed.id,category,birthDate,weight,color,motherTag:"",fatherTag:"",abortHistory:"hayır",reproductionStatus:"",kidCount:"0",notes,abortDetails:"",archived:false,archiveReason:""};
    const {error}=await sb.from("goats").insert(fromGoat(g));
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave(g);
  };

  if(showScanner) return <EarTagScanner onResult={tag=>{setEarTag(tag);setShowScanner(false);}} onClose={()=>setShowScanner(false)}/>;

  return <ModalWrap title={`${breed.emoji} ${breed.name} — Hayvan Ekle`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>İsim *</FL>
    <input value={name} onChange={e=>setName(e.target.value)} style={S.input} placeholder="Keçi adı"/>
    <FL>Küpe No *</FL>
    <div style={{display:"flex",gap:6}}>
      <input value={earTag} onChange={e=>setEarTag(e.target.value)} style={{...S.input,flex:1}} placeholder="TR-15-0001"/>
      <button onClick={()=>setShowScanner(true)} style={{...S.btnOutline,padding:"9px 12px",fontSize:12,whiteSpace:"nowrap"}}>📷 Oku</button>
    </div>
    <FL>Cinsiyet</FL>
    <select value={gender} onChange={e=>setGender(e.target.value)} style={S.select}><option value="dişi">Dişi</option><option value="erkek">Erkek</option></select>
    <FL>Kategori</FL>
    <select value={category} onChange={e=>setCategory(e.target.value)} style={S.select}><option value="anac">Anaç</option><option value="oglak">Oğlak</option></select>
    <FL>Doğum Tarihi</FL>
    <input type="date" value={birthDate} onChange={e=>setBirthDate(e.target.value)} style={S.input}/>
    <FL>Ağırlık (kg)</FL>
    <input type="number" value={weight} onChange={e=>setWeight(e.target.value)} style={S.input} placeholder="0"/>
    <FL>Renk</FL>
    <input value={color} onChange={e=>setColor(e.target.value)} style={S.input} placeholder="Beyaz, Siyah..."/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function ModalWrap({title,onClose,children}){return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",paddingBottom:32}}><div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}><div style={{width:40,height:4,borderRadius:2,background:"#E0DDD4"}}/></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 18px 14px"}}><div style={{fontWeight:800,fontSize:16,color:"#1e1e1e"}}>{title}</div><button onClick={onClose} style={{background:"#F2F0EA",border:"none",borderRadius:"50%",width:30,height:30,fontSize:16,cursor:"pointer",color:"#555"}}>✕</button></div><div style={{padding:"0 18px",display:"flex",flexDirection:"column",gap:10}}>{children}</div></div></div>;}
function FL({children}){return <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:3,marginTop:4}}>{children}</div>;}
function ErrBox({msg}){return <div style={{background:"#FFF0EE",border:"1px solid #F5C0BA",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#BE3B31",fontWeight:600}}>⚠️ {msg}</div>;}
function StatusPicker({value,onChange}){return <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["tedavi_altında","Tedavide","#FFF8EC","#B8750A"],["iyileşti","İyileşti","#E3F0DC","#3D5A25"],["kronik","Kronik","#F0E6F6","#7B2D8E"],["öldü","Öldü","#FFF0EE","#BE3B31"]].map(([v,l,bg,c])=><button key={v} onClick={()=>onChange(v)} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${value===v?c:"#E8E5DC"}`,background:value===v?bg:"#fff",color:value===v?c:"#8c8c7e",fontWeight:700,fontSize:12,cursor:"pointer"}}>{l}</button>)}</div>;}
function Stat({v,l,bg,c}){return <div style={{background:bg,borderRadius:10,padding:"10px 8px",textAlign:"center",flex:1}}><div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div><div style={{fontSize:10,color:c,fontWeight:600,opacity:.75}}>{l}</div></div>;}
function Badge({bg,color,text}){return <span style={{background:bg,color,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,whiteSpace:"nowrap"}}>{text}</span>;}
function StatusBadge({status}){const m={"tedavi_altında":["#FFF8EC","#B8750A","Tedavide"],"iyileşti":["#E3F0DC","#3D5A25","İyileşti"],"kronik":["#F0E6F6","#7B2D8E","Kronik"],"öldü":["#FFF0EE","#BE3B31","Öldü"]};const [bg,c,t]=m[status]||["#F2F0EA","#8c8c7e",status];return <span style={{background:bg,color:c,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{t}</span>;}
function AnnouncementBox({ announcements, setAnnouncements, currentUser }) {
  const [newMsg, setNewMsg] = useState("");
  const [saving, setSaving] = useState(false);
  const [expanded, setExpanded] = useState(true);
  const isVet = currentUser === "Veteriner Hekim";

  const save = async () => {
    if (!newMsg.trim()) return;
    setSaving(true);
    const ann = { id:"a"+Date.now(), message:newMsg.trim(), user_name:currentUser };
    const { error } = await sb.from("announcements").insert(ann);
    if (!error) {
      setAnnouncements(p=>[{...ann, created_at:new Date().toISOString()},...p]);
      setNewMsg("");
    }
    setSaving(false);
  };

  const del = async (id) => {
    await sb.from("announcements").delete().eq("id", id);
    setAnnouncements(p=>p.filter(a=>a.id!==id));
  };

  return (
    <div style={{...S.card,marginBottom:12,background:"#FFFDF5",border:"1.5px solid #F0D49A"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:expanded?10:0}}>
        <div style={{fontWeight:800,fontSize:14,color:"#B8750A"}}>📢 Duyurular {announcements.length>0&&`(${announcements.length})`}</div>
        <button onClick={()=>setExpanded(!expanded)} style={{...S.ghost,fontSize:12,color:"#8c8c7e"}}>{expanded?"▲ Gizle":"▼ Göster"}</button>
      </div>
      {expanded && <>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="Duyuru yaz..." style={{...S.input,flex:1,fontSize:13,padding:"8px 12px"}}/>
          <button onClick={save} disabled={saving||!newMsg.trim()} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13,opacity:(!newMsg.trim()||saving)?.5:1}}>
            {saving?"...":"Gönder"}
          </button>
        </div>
        {announcements.length===0 && <div style={{fontSize:12,color:"#aaa",textAlign:"center",padding:"8px 0"}}>Henüz duyuru yok</div>}
        {announcements.map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"start",gap:8,padding:"8px 10px",background:"#FFF8EC",borderRadius:8,marginBottom:6,border:"1px solid #F5E0A0"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#1e1e1e",fontWeight:500,marginBottom:3}}>{a.message}</div>
              <div style={{fontSize:10,color:"#B8750A",fontWeight:600}}>{a.user_name} · {fmtDT(a.created_at)}</div>
            </div>
            {isVet && (
              <button onClick={()=>del(a.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:11,padding:"3px 8px",flexShrink:0}}>✕</button>
            )}
          </div>
        ))}
      </>}
    </div>
  );
}

function Empty({text}){return <div style={{textAlign:"center",padding:30,color:"#8c8c7e",fontSize:13}}>{text}</div>;}
function MiniPill({label,val,color}){return <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,fontWeight:900,color}}>{val}</span><span style={{fontSize:10,color:"#8c8c7e"}}>{label}</span></div>;}
function PillTag({bg,color,text}){return <span style={{background:bg,color,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:8,whiteSpace:"nowrap"}}>{text}</span>;}

// ── Raporlar ──
function ReportsPage({reports, goats, logs, onDeleteReport}) {
  const [selBreed, setSelBreed] = useState("all");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [expandedReport, setExpandedReport] = useState(null);
  const filtered = selBreed==="all" ? reports : reports.filter(r=>r.breed===selBreed);
  const sorted = [...filtered].sort((a,b)=>new Date(b.dateClosed)-new Date(a.dateClosed));
  const stats = {
    total: reports.length,
    iyilesti: reports.filter(r=>["İyileşti","Tedavi Tamamlandı"].includes(r.closeReason)).length,
    oldu: reports.filter(r=>r.closeReason==="Hayvan Öldü").length,
  };

  const handleDelete = async (id) => {
    await sb.from("reports").delete().eq("id", id);
    onDeleteReport(id);
    setConfirmDelete(null);
  };

  return (
    <div className="anim-fade">
      {confirmDelete && (
        <div onClick={()=>setConfirmDelete(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:320}}>
            <div style={{fontWeight:800,fontSize:16,color:"#1e1e1e",marginBottom:8}}>🗑 Raporu Sil</div>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>Bu rapor kalıcı olarak silinecek. Emin misiniz?</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDelete(null)} style={{...S.btnOutline,flex:1,padding:10}}>İptal</button>
              <button onClick={()=>handleDelete(confirmDelete)} style={{...S.btnPrimary,flex:1,padding:10,background:"#BE3B31"}}>Evet, Sil</button>
            </div>
          </div>
        </div>
      )}
      <h2 style={{...S.title,marginBottom:12}}>📊 Raporlar</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
        <Stat v={stats.total} l="Toplam" bg="#E8E5DC" c="#444"/>
        <Stat v={stats.iyilesti} l="İyileşti" bg="#E3F0DC" c="#3D5A25"/>
        <Stat v={stats.oldu} l="Öldü" bg="#FFF0EE" c="#BE3B31"/>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({reports.length})</button>
        {BREEDS.map(b=>{const cnt=reports.filter(r=>r.breed===b.id).length;return <button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name} ({cnt})</button>;})}
      </div>
      {sorted.length===0 && <Empty text="Henüz sonlandırılmış kayıt yok"/>}
      {sorted.map(r=>{
        const b=BREEDS.find(x=>x.id===r.breed);
        const isDeath=r.closeReason==="Hayvan Öldü";
        const rLogs=logs.filter(l=>l.goatId===r.goatId).sort((a,c)=>new Date(a.createdAt)-new Date(c.createdAt));
        const isExpanded=expandedReport===r.id;

                      <div style={{fontSize:11,color:"#555",marginTop:1}}>{l.actionDetail}</div>

// ── Irk Aşı Sekmesi ──
function BreedVaccineTab({breed,goats,vaccines,onAdd}){
  const breedGoats=goats.filter(g=>g.breed===breed.id&&!g.archived);
  const [viewTab,setViewTab]=useState("takvim");
  const calendar=useMemo(()=>VACCINE_DEFS.map(vd=>{
    const rows=breedGoats.map(g=>{
      const last=vaccines.filter(v=>v.goatId===g.id&&v.vaccineType===vd.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      const nextD=last?(()=>{const d=new Date(last.date);d.setDate(d.getDate()+vd.intervalDays);return d.toISOString().split("T")[0];})():null;
      return{goat:g,last,nextD,days:nextD?daysUntil(nextD):null};
    });
    return{vd,rows,hasAny:rows.some(r=>r.last)};
  }),[breedGoats,vaccines]);
  const history=[...vaccines].filter(v=>v.breed===breed.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return (
    <div>
      <button onClick={onAdd} style={{...S.btnPrimary,width:"100%",marginBottom:10,fontSize:13}}>💉 Toplu Aşı Kaydı Ekle</button>
      <div style={{display:"flex",background:"#fff",borderRadius:10,marginBottom:10,border:"1px solid #E8E5DC",overflow:"hidden"}}>
        <button onClick={()=>setViewTab("takvim")} style={{...S.tabBtn,background:viewTab==="takvim"?breed.color:"transparent",color:viewTab==="takvim"?"#fff":"#8c8c7e",fontSize:12}}>📅 Takvim</button>
        <button onClick={()=>setViewTab("gecmis")} style={{...S.tabBtn,background:viewTab==="gecmis"?breed.color:"transparent",color:viewTab==="gecmis"?"#fff":"#8c8c7e",fontSize:12}}>📋 Geçmiş</button>
      </div>
      {viewTab==="takvim" && calendar.map(({vd,rows,hasAny})=>{
        if(!hasAny) return <div key={vd.id} style={{...S.card,padding:"10px 14px",marginBottom:6,opacity:.6}}><div style={{fontWeight:700,fontSize:13,color:"#aaa"}}>💉 {vd.name}</div><div style={{fontSize:11,color:"#ccc"}}>Kayıt yok</div></div>;
        const urgentCount=rows.filter(r=>r.days!==null&&r.days<=7).length;
        const soonCount=rows.filter(r=>r.days!==null&&r.days<=30&&r.days>7).length;
        return (
          <div key={vd.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${vd.color}22`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontWeight:800,fontSize:13,color:vd.color}}>💉 {vd.name}</div>
              <div style={{display:"flex",gap:4}}>
                {urgentCount>0&&<PillTag bg="#FFF0EE" color="#BE3B31" text={`⚠️ ${urgentCount} acil`}/>}
                {soonCount>0&&<PillTag bg="#FFF8EC" color="#B8750A" text={`${soonCount} yakın`}/>}
              </div>
            </div>
            {rows.filter(r=>r.last).map(r=>{
              const d=r.days;const urgent=d!==null&&d<=7;const soon=d!==null&&d<=30;
              return <div key={r.goat.id} style={{display:"flex",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #F2F0EA"}}>
                <span style={{fontSize:12,fontWeight:600,color:"#333",flex:"0 0 90px"}}>{r.goat.name}</span>
                <span style={{fontSize:10,color:"#8c8c7e",flex:1}}>Son: {fmt(r.last.date)}</span>
                <span style={{fontSize:11,fontWeight:700,color:urgent?"#BE3B31":soon?"#D4850A":"#4A7C3F"}}>{r.nextD?`${fmt(r.nextD)}${d<=30&&d>=0?` (${d}g)`:""}` : "—"}</span>
              </div>;
            })}
            {rows.filter(r=>!r.last).length>0&&<div style={{fontSize:11,color:"#aaa",padding:"4px 0"}}>Kayıtsız: {rows.filter(r=>!r.last).map(r=>r.goat.name).join(", ")}</div>}
          </div>
        );
      })}
      {viewTab==="gecmis" && (
        <div>
          {history.length===0 && <Empty text="Aşı kaydı yok"/>}
          {history.map(v=>{
            const g=goats.find(x=>x.id===v.goatId);
            const vd=VACCINE_DEFS.find(x=>x.id===v.vaccineType);
            return <div key={v.id} style={{...S.card,padding:10,marginBottom:5}}>
              <div style={{fontWeight:700,fontSize:13,color:vd?.color||"#333"}}>💉 {vd?.name}</div>
              <div style={{fontSize:11,color:"#8c8c7e"}}>🐐 {g?.name} · 📅 {fmt(v.date)}</div>
              {v.batchNo&&<div style={{fontSize:10,color:"#aaa"}}>Parti: {v.batchNo}</div>}
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

// ════════════ MAIN APP ════════════
function App(){
  const [page,setPage]=useState("home");
  const [selBreed,setSelBreed]=useState(null);
  const [breedTab,setBreedTab]=useState("surü");
  const [catTab,setCatTab]=useState("anac");
  const [selGoat,setSelGoat]=useState(null);
  const [detailTab,setDetailTab]=useState("info");
  const [showLogin,setShowLogin]=useState(true);
  const [currentUser,setCurrentUser]=useState("");
  const [loading,setLoading]=useState(true);

  const [goats,setGoats]=useState([]);
  const [healthRecs,setHealthRecs]=useState([]);
  const [vaccines,setVaccines]=useState([]);
  const [reports,setReports]=useState([]);
  const [logs,setLogs]=useState([]);

  const [hModal,setHModal]=useState(null);
  const [vModal,setVModal]=useState(null);
  const [addGoatModal,setAddGoatModal]=useState(null);
  const [archiveConfirm,setArchiveConfirm]=useState(null);

  useEffect(()=>{
    if(showLogin) return;
    const load=async()=>{
      setLoading(true);
      const [g,h,v,r,l]=await Promise.all([
        sb.from("goats").select("*"),
        sb.from("health_records").select("*").eq("closed",false),
        sb.from("vaccines").select("*"),
        sb.from("reports").select("*"),
        sb.from("health_logs").select("*"),
      ]);
      setGoats((g.data||[]).map(toGoat));
      setHealthRecs((h.data||[]).map(toHealth));
      setVaccines((v.data||[]).map(toVaccine));
      setReports((r.data||[]).map(toReport));
      setLogs((l.data||[]).map(toLog));
      setLoading(false);
    };
    load();
  },[showLogin]);

  const upcomingAll=useMemo(()=>{
    const list=[];
    goats.filter(g=>!g.archived).forEach(g=>{
      VACCINE_DEFS.forEach(vd=>{
        const next=nextVaccineDate(g.id,vd.id,vaccines);
        if(next){const d=daysUntil(next);if(d<=30&&d>=0)list.push({goat:g,vd,days:d,next});}
      });
    });
    return list.sort((a,b)=>a.days-b.days);
  },[goats,vaccines]);

  const breedStats=useMemo(()=>{
    const r={};
    BREEDS.forEach(b=>{
      const all=goats.filter(g=>g.breed===b.id&&!g.archived);
      r[b.id]={total:all.length,anac:all.filter(g=>g.category==="anac").length,oglak:all.filter(g=>g.category==="oglak").length,sick:healthRecs.filter(h=>h.breed===b.id&&h.status==="tedavi_altında").length};
    });
    return r;
  },[goats,healthRecs]);

  const navigate=p=>{setPage(p);setSelBreed(null);setSelGoat(null);setBreedTab("surü");setCatTab("anac");setDetailTab("info");};
  const goBack=()=>{if(selGoat){setSelGoat(null);setDetailTab("info");}else if(selBreed){setSelBreed(null);}else navigate("home");};
  const saveHealth=rec=>{setHealthRecs(p=>[rec,...p]);setHModal(null);};
  const saveVaccines=recs=>{setVaccines(p=>[...recs,...p]);setVModal(null);};
  const saveGoat=g=>{setGoats(p=>[...p,g]);setAddGoatModal(null);};
  const updateHealth=updated=>{setHealthRecs(p=>p.map(h=>h.id===updated.id?updated:h));};
  const addLogToState=newLog=>{setLogs(p=>[newLog,...p]);};

  const finalizeHealth=async(id,report)=>{
    setHealthRecs(p=>p.filter(h=>h.id!==id));
    setReports(p=>[report,...p]);

            onAddHealth={()=>setHModal({breedId:goat.breed,goatId:goat.id})}
            onUpdateHealth={updateHealth} onFinalizeHealth={finalizeHealth}
            onLogsUpdate={addLogToState}
            detailTab={detailTab} setDetailTab={setDetailTab} currentUser={currentUser}/>
        )}

        {/* HEALTH PAGE */}
        {page==="health" && (
          <div className="anim-fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <h2 style={S.title}>🩺 Sağlık Kayıtları</h2>
              <button onClick={()=>setHModal({})} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>+ Ekle</button>
            </div>
            {BREEDS.map(b=>{
              const recs=healthRecs.filter(h=>h.breed===b.id&&!h.closed);
              if(!recs.length) return null;
              const tedavi=recs.filter(h=>h.status==="tedavi_altında");
              return (
                <div key={b.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div style={{fontWeight:800,fontSize:14,color:b.color}}>{b.emoji} {b.name}</div>
                    <div style={{display:"flex",gap:6}}>
                      {tedavi.length>0&&<PillTag bg="#FFF0EE" color="#BE3B31" text={`${tedavi.length} tedavide`}/>}
                      <button onClick={()=>{setPage("goats");setSelBreed(b.id);setBreedTab("saglik");}} style={{...S.btnSm,background:b.bg,color:b.color,fontSize:10}}>Detay →</button>
                    </div>
                  </div>
                  {recs.sort((a,c)=>new Date(c.date)-new Date(a.date)).slice(0,2).map(h=>{
                    const g=goats.find(x=>x.id===h.goatId);
                    return (
                      <div key={h.id} style={{...S.card,padding:10,marginBottom:4,cursor:"pointer"}}
                        onClick={()=>{setSelGoat(h.goatId);setDetailTab("health");setPage("goats");setSelBreed(b.id);}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                          <div>
                            <div style={{fontSize:11,color:b.color,fontWeight:700,marginBottom:1}}>{g?.name} ({g?.earTag})</div>
                            <div style={{fontWeight:700,fontSize:13,color:"#1e1e1e"}}>{h.condition}</div>
                            <div style={{fontSize:11,color:"#8c8c7e"}}>{fmt(h.date)} · {h.createdByName}</div>
                          </div>
                          <StatusBadge status={h.status}/>
                        </div>
                      </div>
                    );
                  })}
                  {recs.length>2&&<div style={{fontSize:11,color:"#8c8c7e",textAlign:"center",padding:"4px 0"}}>+{recs.length-2} kayıt daha</div>}
                </div>
              );
            })}
          </div>
        )}

        {page==="vaccines" && <GlobalVaccinePage goats={goats} vaccines={vaccines} upcomingAll={upcomingAll} onAddVaccine={breedId=>setVModal(breedId)}/>}

        {page==="reports" && <ReportsPage reports={reports} goats={goats} logs={logs} onDeleteReport={deleteReport}/>}

        {/* PROFILE */}
        {page==="profile" && (
          <div className="anim-fade">
            <div style={{...S.card,textAlign:"center",padding:22,marginBottom:10}}>
              <div style={{fontSize:44}}>👤</div>
              <h2 style={{margin:"4px 0 2px",fontSize:20,fontWeight:900,color:"#1e1e1e"}}>{currentUser}</h2>
              <div style={{fontSize:12,color:"#8c8c7e",marginTop:4}}>
                {DEMO_USERS.find(u=>u.name===currentUser)?.members || (DEMO_USERS.find(u=>u.name===currentUser)?.role==="veteriner"?"Veteriner Hekim":"Şef")}
              </div>
              <div style={{marginTop:12}}>
                <button onClick={()=>setShowLogin(true)} style={{...S.btnOutline,color:"#BE3B31",borderColor:"#BE3B31",fontSize:13}}>🚪 Çıkış Yap</button>
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontWeight:700,fontSize:13,color:"#4A7C3F",marginBottom:8}}>👥 Kullanıcılar & Vardiyalar</div>
              {DEMO_USERS.map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F2F0EA"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1e1e1e"}}>{u.name}{u.name===currentUser?" (siz)":""}</div>
                    {u.members && <div style={{fontSize:11,color:"#8c8c7e"}}>{u.members}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={S.nav}>
        {[["home","🏠","Ana"],["goats","🐐","Sürü"],["health","🩺","Sağlık"],["vaccines","💉","Aşı"],["reports","📊","Rapor"]].map(([k,ic,l])=>(
          <button key={k} onClick={()=>navigate(k)} style={{...S.ghost,display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"4px 6px",color:page===k?"#4A7C3F":"#8c8c7e"}}>
            <span style={{fontSize:17}}>{ic}</span>
            <span style={{fontSize:9,fontWeight:page===k?700:500}}>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const css=`
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:0}
  .anim-fade{animation:fadeUp .3s ease both}
  .anim-slide{animation:slideIn .3s ease both}
`;

const S={
  app:{fontFamily:"system-ui,-apple-system,sans-serif",background:"#FAFAF5",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"},
  loginWrap:{fontFamily:"system-ui,-apple-system,sans-serif",minHeight:"100vh",background:"linear-gradient(155deg,#2D4A20 0%,#4A7C3F 40%,#6B9F5B 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20},
  header:{background:"#4A7C3F",padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:200,boxShadow:"0 3px 16px rgba(74,124,63,.2)"},
  nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E8E5DC",display:"flex",justifyContent:"space-around",padding:"4px 0 6px",zIndex:200,boxShadow:"0 -2px 12px rgba(0,0,0,.04)"},
  card:{background:"#fff",borderRadius:14,padding:14,border:"1px solid #E8E5DC",boxShadow:"0 1px 3px rgba(0,0,0,.03)"},
  title:{margin:0,fontSize:18,fontWeight:800,color:"#1e1e1e"},
  input:{padding:"9px 12px",borderRadius:8,border:"1px solid #E8E5DC",fontSize:14,background:"#fff",color:"#1e1e1e",outline:"none",width:"100%",boxSizing:"border-box"},
  select:{padding:"9px 12px",borderRadius:8,border:"1px solid #E8E5DC",fontSize:14,background:"#fff",color:"#1e1e1e",outline:"none",width:"100%",boxSizing:"border-box"},
  btnPrimary:{background:"#4A7C3F",color:"#fff",border:"none",borderRadius:10,padding:"11px 16px",fontWeight:700,fontSize:14,cursor:"pointer"},
  btnOutline:{background:"transparent",color:"#4A7C3F",border:"2px solid #4A7C3F",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:14,cursor:"pointer"},
  btnSm:{border:"none",borderRadius:8,padding:"5px 10px",fontWeight:700,fontSize:11,cursor:"pointer"},
  ghost:{background:"none",border:"none",cursor:"pointer"},
  tabBtn:{flex:1,padding:"10px 0",border:"none",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"},
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
