// ── Küpe Okuma ──
function EarTagScanner({ onResult, onClose }) {
  const [scanning, setScanning] = useState(false);
  const [preview,  setPreview]  = useState(null);
  const [result,   setResult]   = useState("");
  const [err,      setErr]      = useState("");
  const fileRef = useRef();
  const camRef  = useRef();

  const processImage = async (file) => {
    setScanning(true); setErr(""); setResult("");
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(",")[1];
      setPreview(e.target.result);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:100,
            messages:[{
              role:"user",
              content:[
                { type:"image", source:{ type:"base64", media_type:file.type||"image/jpeg", data:base64 } },
                { type:"text", text:"Bu görselde bir hayvan küpe etiketi var. Küpe üzerindeki numaranın son 4 rakamını bul ve sadece şu formatta yaz: TR-15-XXXX (son 4 hane). Eğer tam numarayı okuyabiliyorsan TR-XX-XXXX formatında yaz. Sadece numarayı yaz, başka hiçbir şey yazma. Numara göremiyorsan sadece 'bulunamadı' yaz." }
              ]
            }]
          })
        });
        const data = await res.json();
        const text = (data.content?.[0]?.text||"").trim();
        if (text && text!=="bulunamadı" && text.length>=4) {
          setResult(text);
        } else {
          setErr("Numara okunamadı. Daha yakından veya net bir fotoğraf deneyin.");
        }
      } catch(e) { setErr("Bağlantı hatası. İnternet bağlantınızı kontrol edin."); }
      setScanning(false);
    };
    reader.readAsDataURL(file);
  };

  return <ModalWrap title="📷 Küpe Numarası Oku" onClose={onClose}>
    <div style={{textAlign:"center",padding:"4px 0"}}>
      <div style={{fontSize:12,color:"#8c8c7e",marginBottom:10}}>Kamera ile çekin veya galeriden seçin</div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <button onClick={()=>camRef.current.click()} style={{...S.btnPrimary,flex:1,fontSize:13}}>📷 Kamera</button>
        <button onClick={()=>fileRef.current.click()} style={{...S.btnOutline,flex:1,fontSize:13}}>🖼 Galeri</button>
      </div>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>e.target.files[0]&&processImage(e.target.files[0])}/>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&processImage(e.target.files[0])}/>
      {preview && <img src={preview} style={{width:"100%",borderRadius:10,marginBottom:8,maxHeight:180,objectFit:"cover"}} alt="preview"/>}
      {scanning && <div style={{color:"#4A7C3F",fontWeight:700,fontSize:13,padding:10}}>🔍 Numara okunuyor...</div>}
      {err && <ErrBox msg={err}/>}
      {result && <div style={{background:"#E3F0DC",borderRadius:10,padding:12,marginTop:8}}>
        <div style={{fontSize:11,color:"#3D5A25",marginBottom:4}}>✅ Okunan numara:</div>
        <div style={{fontSize:20,fontWeight:900,color:"#3D5A25",letterSpacing:1}}>{result}</div>
        <button onClick={()=>onResult(result)} style={{...S.btnPrimary,width:"100%",marginTop:10,fontSize:13}}>Bu numarayı kullan</button>
      </div>}
    </div>
    <button onClick={onClose} style={{...S.btnOutline,width:"100%"}}>İptal</button>
  </ModalWrap>;
}

function HealthDetailModal({ record, goat, logs, treatmentDays, onUpdate, onClose, onFinalize, currentUser, onLogsUpdate, onTreatmentDayUpdate }) {
  const [status,    setStatus]    = useState(record.status);
  const [treatment, setTreatment] = useState(record.treatment||"");
  const [notes,     setNotes]     = useState(record.notes||"");
  const [saving,    setSaving]    = useState(false);
  const [showClose, setShowClose] = useState(false);
  const [closeReason, setCloseReason] = useState("");
  const [closeNote,   setCloseNote]   = useState("");
  const [tab, setTab] = useState("detay");
  const [treatmentChanged, setTreatmentChanged] = useState(false);
  const [markingDay, setMarkingDay] = useState(null);

  const recLogs = logs.filter(l=>l.healthRecordId===record.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const recDays = treatmentDays.filter(d=>d.healthRecordId===record.id).sort((a,b)=>a.dayNumber-b.dayNumber);
  const today = todayISO();

  const markDay = async (day) => {
    if(day.done) return;
    setMarkingDay(day.id);
    const now = new Date().toISOString();
    await sb.from("treatment_days").update({done:true, done_by:currentUser, done_at:now}).eq("id",day.id);
    onTreatmentDayUpdate({...day, done:true, doneBy:currentUser, doneAt:now});
    setMarkingDay(null);
  };

  const save = async () => {
    setSaving(true);
    const changes = [];
    if (status!==record.status) changes.push(`Durum değişti: "${record.status}" → "${status}"`);
    if (treatment!==record.treatment) changes.push(`Tedavi güncellendi`);
    if (notes!==record.notes && notes) changes.push(`Not eklendi`);
    const { error } = await sb.from("health_records").update({ status, treatment, notes }).eq("id", record.id);
    if (!error) {
      const detail = changes.length>0 ? changes.join(" · ") : "Kayıt güncellendi";
      const gId = goat?.id || record.goatId;
      const gBreed = goat?.breed || record.breed;
      await addLog(record.id, gId, gBreed, "güncelleme", detail, currentUser);
      const newLog = { id:"l"+Date.now(), healthRecordId:record.id, goatId:gId, breed:gBreed, action:"güncelleme", actionDetail:detail, userName:currentUser, createdAt:new Date().toISOString() };
      onLogsUpdate(newLog);
      onUpdate({ ...record, status, treatment, notes });
    }
    setSaving(false);
  };

  const finalize = async () => {
    if (!closeReason) return;
    setSaving(true);
    const report = {
      id:"r"+Date.now(), goatId:goat?.id||record.goatId, goatName:goat?.name||record.goatEarTag||"—", goatEarTag:goat?.earTag||record.goatEarTag||"—", breed:goat?.breed||record.breed,
      dateStarted:record.date, dateClosed:todayISO(), condition:record.condition,
      treatment, closeReason, closeNote, veterinarian:record.veterinarian, cost:"", createdByName:currentUser, notes
    };
    await sb.from("health_records").update({ closed:true, status:closeReason==="Hayvan Öldü"?"öldü":"iyileşti" }).eq("id", record.id);
    await sb.from("reports").insert(fromReport(report));
    await addLog(record.id, goat?.id||record.goatId, goat?.breed||record.breed, "sonlandırma", `Neden: ${closeReason}${closeNote?" — "+closeNote:""}`, currentUser);
    onFinalize(record.id, report);
    setSaving(false);
  };

  if (showClose) return <ModalWrap title="📋 Kaydı Sonlandır" onClose={()=>setShowClose(false)}>
    <div style={{background:"#FFF8EC",border:"1px solid #F0D49A",borderRadius:10,padding:10,fontSize:12,color:"#8B5A1B"}}>
      ⚠️ Bu kayıt sonlandırılacak ve rapor bölümüne taşınacak.
    </div>
    <FL>Sonlandırma Nedeni *</FL>
    <select value={closeReason} onChange={e=>setCloseReason(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CLOSE_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
    </select>
    <FL>Ek Not</FL>
    <textarea value={closeNote} onChange={e=>setCloseNote(e.target.value)} rows={3} style={{...S.input,resize:"vertical",lineHeight:1.5}} placeholder="Sonuç hakkında not..."/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={()=>setShowClose(false)} style={{...S.btnOutline,flex:1,padding:12}}>Geri</button>
      <button onClick={finalize} disabled={!closeReason||saving} style={{...S.btnPrimary,flex:2,padding:12,background:"#BE3B31",opacity:(!closeReason||saving)?.5:1}}>{saving?"Kaydediliyor...":"✅ Sonlandır"}</button>
    </div>
  </ModalWrap>;

  return <ModalWrap title={`🩺 ${record.condition}`} onClose={onClose}>
    <div style={{background:"#F5F3ED",borderRadius:10,padding:10,fontSize:12}}>
      {goat ? <><b>{goat.name}</b> · 🏷 {goat.earTag}</> : <><b>🏷 {record.goatEarTag||"—"}</b></>} · Başlangıç: {fmt(record.date)}
    </div>
    <div style={{display:"flex",background:"#F2F0EA",borderRadius:8,overflow:"hidden",marginTop:4}}>
      {[["detay","✏️ Güncelle"],["takvim","📅 Takvim"],["gecmis","📋 Geçmiş"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab===k?"#4A7C3F":"transparent",color:tab===k?"#fff":"#8c8c7e"}}>{l}</button>
      ))}
    </div>

    {tab==="detay" && <>
      <FL>Durum</FL>
      <StatusPicker value={status} onChange={setStatus}/>
      <FL>Tedavi / Yapılan İşlem</FL>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#F5FAF0",borderRadius:8,border:"1px solid #D4E8C2"}}>
        <input type="checkbox" id="sameTreatment" checked={!treatmentChanged}
          onChange={e=>setTreatmentChanged(!e.target.checked)}
          style={{width:16,height:16,cursor:"pointer"}}/>
        <label htmlFor="sameTreatment" style={{fontSize:12,color:"#3D5A25",fontWeight:600,cursor:"pointer"}}>
          Aynı tedavi devam ediyor (değişiklik yok)
        </label>
      </div>
      <textarea value={treatment} onChange={e=>{setTreatment(e.target.value);setTreatmentChanged(true);}} rows={3}
        style={{...S.input,resize:"vertical",lineHeight:1.5,opacity:treatmentChanged?1:.7}}
        placeholder="İlaç, doz, işlem..."/>
      <FL>Notlar</FL>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setShowClose(true)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",padding:"10px 14px",fontSize:12}}>📋 Sonlandır</button>
        <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:1,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Güncelle"}</button>
      </div>
    </>}

    {tab==="takvim" && (
      <div>
        {/* Tedavi notu özeti */}
        {record.treatment && (
          <div style={{background:"#F5FAF0",border:"1px solid #D4E8C2",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#3D5A25",marginBottom:2}}>💊 Tedavi</div>
            <div style={{fontSize:12,color:"#333"}}>{record.treatment}</div>
          </div>
        )}
        {record.notes && (
          <div style={{background:"#F5F3ED",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:2}}>📝 Not</div>
            <div style={{fontSize:12,color:"#555"}}>{record.notes}</div>
          </div>
        )}
        {recDays.length===0 && (
          <div style={{textAlign:"center",padding:20,color:"#8c8c7e",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:8}}>📅</div>
            Bu kayıt için tedavi takvimi oluşturulmamış.
          </div>
        )}
        {recDays.map(day=>{
          const isPast = day.plannedDate < today;
          const isToday = day.plannedDate === today;
          const isFuture = day.plannedDate > today;
          const canMark = (isToday || isPast) && !day.done;
          return (
            <div key={day.id} style={{
              borderRadius:12, padding:12, marginBottom:8,
              background: day.done ? "#E3F0DC" : isToday ? "#EEF6FC" : isFuture ? "#F9F9F6" : "#FFF0EE",
              border: `2px solid ${day.done?"#4A7C3F":isToday?"#2873A8":isPast?"#F5C0BA":"#E8E5DC"}`
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:day.done?"#3D5A25":isToday?"#2873A8":isPast?"#BE3B31":"#8c8c7e"}}>
                    {day.done?"✅":isToday?"🔵":isPast?"⚠️":"⏳"} {day.dayNumber}. Gün
                  </div>
                  <div style={{fontSize:11,color:"#8c8c7e",marginTop:2}}>
                    📅 {fmt(day.plannedDate)}
                    {isToday && <span style={{color:"#2873A8",fontWeight:700}}> — Bugün</span>}
                  </div>
                  {day.done && day.doneBy && (
                    <div style={{fontSize:11,color:"#3D5A25",fontWeight:700,marginTop:4,background:"rgba(255,255,255,.7)",padding:"4px 8px",borderRadius:6,display:"inline-block"}}>
                      👤 {day.doneBy} · {fmtDT(day.doneAt)}
                    </div>
                  )}
                  {isPast && !day.done && (
                    <div style={{fontSize:11,color:"#BE3B31",fontWeight:600,marginTop:2}}>❌ Henüz yapılmadı</div>
                  )}
                  {isFuture && (
                    <div style={{fontSize:11,color:"#aaa",marginTop:2}}>⏳ {daysUntil(day.plannedDate)} gün sonra</div>
                  )}
                </div>
                {canMark && (
                  <button onClick={()=>markDay(day)} disabled={markingDay===day.id}
                    style={{...S.btnPrimary,fontSize:12,padding:"10px 16px",opacity:markingDay===day.id?.6:1,borderRadius:10,marginLeft:8,flexShrink:0}}>
                    {markingDay===day.id?"⏳":"✅ Yapıldı"}
                  </button>
                )}
              </div>
            </div>

        })}
        {recDays.length>0 && (
          <div style={{background:"#F5F3ED",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#555",marginTop:4}}>
            {recDays.filter(d=>d.done).length}/{recDays.length} gün tamamlandı
          </div>
        )}
      </div>
    )}
    {tab==="gecmis" && <div>
      {recLogs.length===0 && <Empty text="Henüz işlem geçmişi yok"/>}
      {recLogs.map((l,i)=>(
        <div key={l.id} style={{display:"flex",gap:8,padding:"10px 0",borderBottom:i<recLogs.length-1?"1px solid #F2F0EA":"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:l.action==="sonlandırma"?"#FFF0EE":l.action==="açılış"?"#E3F0DC":"#EEF6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1e1e1e"}}>{l.userName}</div>
              <div style={{fontSize:10,color:"#aaa",textAlign:"right"}}>{fmtDT(l.createdAt)}</div>
            </div>
            <div style={{fontSize:11,color:"#555",marginTop:2,background:"#F9F9F6",padding:"4px 8px",borderRadius:6}}>{l.actionDetail}</div>
          </div>
        </div>
      ))}
    </div>}
  </ModalWrap>;
}

function HealthModal({ goats, breedFilter, onSave, onClose, preGoatId, currentUser }) {
  const [breed, setBreed] = useState(breedFilter||"");
  const [category, setCategory] = useState("anac");
  const [earTag, setEarTag] = useState("");
  const [date,setDate]=useState(todayISO());
  const [condition,setCondition]=useState("");
  const [condCustom,setCondCustom]=useState("");
  const [treatment,setTreatment]=useState("");
  const [status,setStatus]=useState("tedavi_altında");
  const [notes,setNotes]=useState("");
  const [treatmentDays,setTreatmentDays]=useState(0);
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!earTag.trim()){setErr("Küpe no giriniz");return;}
    const cond = condition==="Diğer"?condCustom.trim():condition;
    if(!cond){setErr("Hastalık/durum giriniz");return;}
    setSaving(true);
    // Sürüde bu küpe no'lu hayvan var mı kontrol et
    const existingGoat = goats.find(g=>g.earTag===earTag.trim()&&!g.archived);
    const goatId = existingGoat ? existingGoat.id : "ext_"+earTag.trim().replace(/\s/g,"_");
    const rec = { id:"h"+Date.now(), goatId, goatEarTag:earTag.trim(), breed, date, condition:cond, treatment, status, veterinarian:currentUser, cost:"", createdByName:currentUser, notes, category };
    const { error } = await sb.from("health_records").insert({...fromHealth(rec), goat_ear_tag:earTag.trim(), category});
    if(error){setErr("Kayıt hatası: "+error.message);setSaving(false);return;}
    await addLog(rec.id, goatId, breed, "açılış", `${cond} — ${currentUser} tarafından açıldı`, currentUser);
    if(treatmentDays>0){
      const days=[];
      for(let i=0;i<treatmentDays;i++){
        const d=new Date(date);
        d.setDate(d.getDate()+i);
        days.push({
          id:"td"+Date.now()+i,
          health_record_id:rec.id,
          goat_id:goatId,
          day_number:i+1,
          planned_date:d.toISOString().split("T")[0],
          done:false, done_by:null, done_at:null
        });
      }
      await sb.from("treatment_days").insert(days);
      rec.treatmentDays = days.map(d=>({...d,healthRecordId:d.health_record_id,goatId:d.goat_id,dayNumber:d.day_number,plannedDate:d.planned_date,doneBy:d.done_by,doneAt:d.done_at}));
    }
    onSave(rec);
  };

  return <ModalWrap title="🩺 Sağlık Kaydı Ekle" onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Irk *</FL>
    <div style={{display:"flex",gap:6}}>
      {BREEDS.map(b=>(
        <button key={b.id} onClick={()=>setBreed(b.id)}
          style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#E8E5DC"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#8c8c7e",fontWeight:breed===b.id?700:400,fontSize:12,cursor:"pointer"}}>
          {b.emoji} {b.name}
        </button>
      ))}
    </div>
    <FL>Kategori *</FL>
    <div style={{display:"flex",gap:6}}>
      <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#4A7C3F":"#E8E5DC"}`,background:category==="anac"?"#E3F0DC":"#fff",color:category==="anac"?"#3D5A25":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐐 Anaç</button>
      <button onClick={()=>setCategory("oglak")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="oglak"?"#B8602A":"#E8E5DC"}`,background:category==="oglak"?"#FFF4E6":"#fff",color:category==="oglak"?"#8B5A1B":"#8c8c7e",fontWeight:category==="oglak"?700:400,fontSize:13,cursor:"pointer"}}>🍼 Oğlak</button>
    </div>
    <FL>Küpe No *</FL>
    <input value={earTag} onChange={e=>setEarTag(e.target.value)} style={S.input} placeholder="TR-15-0042"/>
    <FL>Tarih *</FL>
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Hastalık / Durum *</FL>
    <select value={condition} onChange={e=>setCondition(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CONDITION_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}
    </select>
    {condition==="Diğer"&&<input style={{...S.input,marginTop:6}} placeholder="Açıklayın..." value={condCustom} onChange={e=>setCondCustom(e.target.value)}/>}
    <FL>Tedavi</FL>
    <textarea value={treatment} onChange={e=>setTreatment(e.target.value)} rows={3} placeholder="İlaç, doz, işlem..." style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
    <FL>Tedavi Süresi (gün)</FL>
    <div style={{display:"flex",gap:6}}>
      {[0,1,2,3,4,5].map(d=>(
        <button key={d} onClick={()=>setTreatmentDays(d)}
          style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px solid ${treatmentDays===d?"#4A7C3F":"#E8E5DC"}`,background:treatmentDays===d?"#E3F0DC":"#fff",color:treatmentDays===d?"#3D5A25":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          {d===0?"—":d}
        </button>
      ))}
    </div>
    {treatmentDays>0&&<div style={{fontSize:11,color:"#4A7C3F",background:"#F5FAF0",padding:"6px 10px",borderRadius:8}}>
      📅 {treatmentDays} günlük tedavi takvimi oluşturulacak ({date} tarihinden itibaren)
    </div>}
    <FL>Durum *</FL>
    <StatusPicker value={status} onChange={setStatus}/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function VaccineModal({ breed, goats, onSave, onClose, currentUser }) {
  const breedGoats=goats.filter(g=>g.breed===breed.id&&!g.archived);
  const anacList=breedGoats.filter(g=>g.category==="anac");
  const oglakList=breedGoats.filter(g=>g.category==="oglak");
  const [vaccineType,setVaccineType]=useState("");
  const [date,setDate]=useState(todayISO());
  const [batchNo,setBatchNo]=useState("");
  const [selected,setSelected]=useState(new Set(breedGoats.map(g=>g.id)));
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const toggle=id=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleGroup=list=>{const allSel=list.every(g=>selected.has(g.id));setSelected(prev=>{const s=new Set(prev);list.forEach(g=>allSel?s.delete(g.id):s.add(g.id));return s;});};
  const save=async()=>{
    if(!vaccineType){setErr("Aşı türü seçiniz");return;}
    if(selected.size===0){setErr("En az bir hayvan seçin");return;}
    setSaving(true);
    const records=[...selected].map(goatId=>({id:"v"+Date.now()+goatId,goatId,breed:breed.id,date,vaccineType,batchNo,createdByName:currentUser}));
    const {error}=await sb.from("vaccines").insert(records.map(fromVaccine));
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave(records);
  };
  const GoatRow=({g})=>{const sel=selected.has(g.id);return <div onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E8E5DC"}`,cursor:"pointer",marginBottom:4}}>

    <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#444"}}>{g.name}</span>
    <span style={{fontSize:10,color:"#8c8c7e",marginLeft:"auto"}}>{g.earTag}</span>
  </div>;};
  return <ModalWrap title={`💉 Toplu Aşı — ${breed.emoji} ${breed.name}`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}><option value="">— Seçin —</option>{VACCINE_DEFS.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select>

    <FL>Parti / Seri No</FL><input value={batchNo} onChange={e=>setBatchNo(e.target.value)} style={S.input} placeholder="örn. ENT-2026-A12"/>
    <FL>Hayvan Seçimi ({selected.size}/{breedGoats.length} seçili)</FL>
    {anacList.length>0&&<>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:700,color:"#3D5A25"}}>🐐 Anaçlar</span>
        <button onClick={()=>toggleGroup(anacList)} style={{...S.btnSm,background:"#E3F0DC",color:"#3D5A25",fontSize:10}}>{anacList.every(g=>selected.has(g.id))?"Tümünü Kaldır":"Tümünü Seç"}</button>
      </div>
      {anacList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    {oglakList.length>0&&<div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,fontWeight:700,color:"#8B5A1B"}}>🍼 Oğlaklar</span>
        <button onClick={()=>toggleGroup(oglakList)} style={{...S.btnSm,background:"#FFF4E6",color:"#8B5A1B",fontSize:10}}>{oglakList.every(g=>selected.has(g.id))?"Tümünü Kaldır":"Tümünü Seç"}</button>
      </div>
      {oglakList.map(g=><GoatRow key={g.id} g={g}/>)}
    </div>}
    <div style={{display:"flex",gap:8,marginTop:12}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💉 "+selected.size+" Hayvana Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function ModalWrap({title,onClose,children}){
  const el = React.useMemo(()=>document.createElement('div'),[]);
  React.useEffect(()=>{
    document.body.appendChild(el);
    document.body.style.overflow='hidden';
    return ()=>{
      document.body.removeChild(el);
      document.body.style.overflow='';
    };
  },[el]);
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9999,overflowY:"auto",backgroundColor:"rgba(0,0,0,.65)",WebkitOverflowScrolling:"touch"}}>
      <div style={{minHeight:"100%",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 12px 100px"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#FAFAF5",borderRadius:16,width:"100%",maxWidth:456,marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px 12px",borderBottom:"1px solid #F2F0EA",position:"sticky",top:0,background:"#FAFAF5",borderRadius:"16px 16px 0 0",zIndex:1}}>
            <div style={{fontWeight:800,fontSize:15,color:"#1e1e1e",flex:1,paddingRight:10}}>{title}</div>
            <button onClick={onClose} style={{background:"#F2F0EA",border:"none",borderRadius:"50%",width:32,height:32,fontSize:16,cursor:"pointer",color:"#555",flexShrink:0}}>✕</button>
          </div>
          <div style={{padding:"14px 18px 20px",display:"flex",flexDirection:"column",gap:10}}>{children}</div>
        </div>
      </div>
    </div>,
    el
  );
}

function StatusPicker({value,onChange}){return <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["tedavi_altında","Tedavide","#FFF8EC","#B8750A"],["iyileşti","İyileşti","#E3F0DC","#3D5A25"],["kronik","Kronik","#F0E6F6","#7B2D8E"],["öldü","Öldü","#FFF0EE","#BE3B31"]].map(([v,l,bg,c])=><button key={v} onClick={()=>onChange(v)} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${value===v?c:"#E8E5DC"}`,background:value===v?bg:"#fff",color:value===v?c:"#8c8c7e",fontWeight:700,fontSize:12,cursor:"pointer"}}>{l}</button>)}</div>;}
function Stat({v,l,bg,c}){return <div style={{background:bg,borderRadius:10,padding:"10px 8px",textAlign:"center",flex:1}}><div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div><div style={{fontSize:10,color:c,fontWeight:600,opacity:.75}}>{l}</div></div>;}
function Badge({bg,color,text}){return <span style={{background:bg,color,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,whiteSpace:"nowrap"}}>{text}</span>;}
function StatusBadge({status}){const m={"tedavi_altında":["#FFF8EC","#B8750A","Tedavide"],"iyileşti":["#E3F0DC","#3D5A25","İyileşti"],"kronik":["#F0E6F6","#7B2D8E","Kronik"],"öldü":["#FFF0EE","#BE3B31","Öldü"]};const [bg,c,t]=m[status]||["#F2F0EA","#8c8c7e",status];return <span style={{background:bg,color:c,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{t}</span>;}

                <div style={{fontSize:13,color:"#BE3B31",fontWeight:700,marginBottom:2}}>
                  ⚠️ Aşı Yaklaşıyor: {vt?.name}
                </div>
                <div style={{fontSize:11,color:"#555"}}>{b?.emoji} {b?.name} · {r.groupName}</div>
                <div style={{fontSize:10,color:"#BE3B31",fontWeight:600}}>📅 {fmt(r.date)} — {d===0?"Bugün!":d===1?"Yarın!":`${d} gün kaldı`}</div>
              </div>
            </div>
          );
        })}
        {/* Yeni duyuru */}
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="Duyuru yaz..." style={{...S.input,flex:1,fontSize:13,padding:"8px 12px"}}/>
          <button onClick={save} disabled={saving||!newMsg.trim()} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13,opacity:(!newMsg.trim()||saving)?.5:1}}>
            {saving?"...":"Gönder"}
          </button>
        </div>
        {announcements.length===0 && urgentVaccines.length===0 && <div style={{fontSize:12,color:"#aaa",textAlign:"center",padding:"8px 0"}}>Henüz duyuru yok</div>}
        {announcements.map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"start",gap:8,padding:"8px 10px",background:"#FFF8EC",borderRadius:8,marginBottom:6,border:"1px solid #F5E0A0"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#1e1e1e",fontWeight:500,marginBottom:3}}>{a.message}</div>
              <div style={{fontSize:10,color:"#B8750A",fontWeight:600}}>{a.user_name} · {fmtDT(a.created_at)}</div>
            </div>
            {isVet && (
              <button onClick={()=>del(a.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:11,padding:"3px 8px",flexShrink:0}}>✕</button>
            )}
          </div>
        ))}
      </>}
    </div>
  );
}

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!earTag.trim()){setErr("Küpe no giriniz");return;}

    const {error} = await sb.from("deaths").insert(rec);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    const obj = {id:rec.id, breed, category, earTag:earTag.trim(), deathDate, deathTime, cause:finalCause, notes, createdBy:currentUser};

          <FL>Irk *</FL>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            {BREEDS.map(b=><button key={b.id} onClick={()=>setBreed(b.id)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#E8E5DC"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#8c8c7e",fontWeight:breed===b.id?700:400,fontSize:11,cursor:"pointer"}}>{b.emoji} {b.name}</button>)}
          </div>
          <FL>Kategori *</FL>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#4A7C3F":"#E8E5DC"}`,background:category==="anac"?"#E3F0DC":"#fff",color:category==="anac"?"#3D5A25":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐐 Anaç</button>
            <button onClick={()=>setCategory("oglak")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="oglak"?"#B8602A":"#E8E5DC"}`,background:category==="oglak"?"#FFF4E6":"#fff",color:category==="oglak"?"#8B5A1B":"#8c8c7e",fontWeight:category==="oglak"?700:400,fontSize:13,cursor:"pointer"}}>🍼 Oğlak</button>

          <input value={earTag} onChange={e=>setEarTag(e.target.value)} style={S.input} placeholder="TR-15-0042"/>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>

              <input type="date" value={deathDate} onChange={e=>setDeathDate(e.target.value)} style={S.input}/>

            <div style={{flex:1}}>
              <FL>Saat</FL>

          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

            <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:11,background:"#BE3B31",opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>

        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {filtered.length===0 && <Empty text="Ölüm kaydı yok"/>}
      {[...filtered].sort((a,b)=>new Date(b.deathDate)-new Date(a.deathDate)).map(d=>{
        const b=BREEDS.find(x=>x.id===d.breed);
        return (
          <div key={d.id} style={{...S.card,padding:12,marginBottom:8,border:"1.5px solid #F5C0BA"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {d.category==="oglak"?"🍼 Oğlak":"🐐 Anaç"} · 📅 {fmt(d.deathDate)}{d.deathTime?` · ⏰ ${d.deathTime}`:""}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>Küpe: {d.earTag}</div>
                <div style={{fontSize:12,color:"#BE3B31",marginTop:2,fontWeight:600}}>☠️ {d.cause}</div>
                {d.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:2}}>📝 {d.notes}</div>}
                <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {d.createdBy}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{background:"#FFF0EE",color:"#BE3B31",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>Öldü</span>

function GroupTreatmentsPage({ groupTreatments, treatmentDaysData, currentUser, onAdd, onUpdate, onDelete, onTreatmentDayUpdate }) {
  const [local, setLocal] = useState(groupTreatments);
  const [showForm, setShowForm] = useState(false);
  const [breed, setBreed] = useState("");
  const [category, setCategory] = useState("anac");
  const [groupName, setGroupName] = useState("");
  const [condition, setCondition] = useState("");
  const [condCustom, setCondCustom] = useState("");
  const [treatment, setTreatment] = useState("");
  const [txDays, setTxDays] = useState(0);
  const [startDate, setStartDate] = useState(todayISO());
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const [selBreed, setSelBreed] = useState("all");
  const [markingDay, setMarkingDay] = useState(null);
  const isVet = currentUser==="Veteriner Hekim";
  const today = todayISO();

  useEffect(()=>setLocal(groupTreatments),[groupTreatments]);

  const reset = ()=>{setBreed("");setCategory("anac");setGroupName("");setCondition("");setCondCustom("");setTreatment("");setTxDays(0);setStartDate(todayISO());setNotes("");setErr("");};

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!groupName.trim()){setErr("Grup adı giriniz");return;}
    const cond = condition==="Diğer"?condCustom.trim():condition;
    if(!cond){setErr("Hastalık giriniz");return;}
    setSaving(true);
    const rec = {id:"gt"+Date.now(), breed, category, group_name:groupName.trim(), condition:cond, treatment:treatment||null, treatment_days:txDays, start_date:startDate, status:"tedavi_altında", notes:notes||null, created_by:currentUser};
    const {error} = await sb.from("group_treatments").insert(rec);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    // Tedavi günleri oluştur
    if(txDays>0){
      const days=[];
      for(let i=0;i<txDays;i++){
        const d=new Date(startDate);d.setDate(d.getDate()+i);
        days.push({id:"gtd"+Date.now()+i,health_record_id:rec.id,goat_id:"group",day_number:i+1,planned_date:d.toISOString().split("T")[0],done:false,done_by:null,done_at:null});
      }
      await sb.from("treatment_days").insert(days);
      days.forEach(d=>onTreatmentDayUpdate({...d,healthRecordId:d.health_record_id,goatId:d.goat_id,dayNumber:d.day_number,plannedDate:d.planned_date,doneBy:"",doneAt:""}));
    }
    const obj={id:rec.id,breed,category,groupName:groupName.trim(),condition:cond,treatment,treatmentDays:txDays,startDate,status:"tedavi_altında",notes,createdBy:currentUser};
    setLocal(p=>[obj,...p]);
    onAdd(obj);
    setShowForm(false);
    reset();
    setSaving(false);
  };

  const del = async (id) => {
    await sb.from("group_treatments").delete().eq("id",id);
    await sb.from("treatment_days").delete().eq("health_record_id",id);
    setLocal(p=>p.filter(x=>x.id!==id));
    onDelete(id);
  };

  const markDay = async (day) => {
    setMarkingDay(day.id);
    const now = new Date().toISOString();
    await sb.from("treatment_days").update({done:true,done_by:currentUser,done_at:now}).eq("id",day.id);
    onTreatmentDayUpdate({...day,done:true,doneBy:currentUser,doneAt:now});
    setMarkingDay(null);
  };

  const filtered = selBreed==="all" ? local : local.filter(g=>g.breed===selBreed);

  return (
    <div className="anim-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={S.title}>🏥 Toplu Tedavi</h2>
        <button onClick={()=>setShowForm(!showForm)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>{showForm?"✕ Kapat":"+ Ekle"}</button>
      </div>

      {showForm && (
        <div style={{...S.card,marginBottom:12,background:"#F5FAF0",border:"1.5px solid #D4E8C2"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#3D5A25",marginBottom:10}}>➕ Toplu Tedavi Kaydı</div>
          {err&&<ErrBox msg={err}/>}
          <FL>Irk *</FL>
          <div style={{display:"flex",gap:6}}>
            {BREEDS.map(b=><button key={b.id} onClick={()=>setBreed(b.id)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#E8E5DC"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#8c8c7e",fontWeight:breed===b.id?700:400,fontSize:11,cursor:"pointer"}}>{b.emoji} {b.name}</button>)}
          </div>
          <FL>Kategori *</FL>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#4A7C3F":"#E8E5DC"}`,background:category==="anac"?"#E3F0DC":"#fff",color:category==="anac"?"#3D5A25":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐐 Anaç</button>
            <button onClick={()=>setCategory("oglak")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="oglak"?"#B8602A":"#E8E5DC"}`,background:category==="oglak"?"#FFF4E6":"#fff",color:category==="oglak"?"#8B5A1B":"#8c8c7e",fontWeight:category==="oglak"?700:400,fontSize:13,cursor:"pointer"}}>🍼 Oğlak</button>
          </div>
          <FL>Grup Adı *</FL>
          <input value={groupName} onChange={e=>setGroupName(e.target.value)} style={S.input} placeholder="örn: Grup A, Doğu Ağıl"/>
          <FL>Hastalık / Durum *</FL>
          <select value={condition} onChange={e=>setCondition(e.target.value)} style={S.select}>
            <option value="">— Seçin —</option>
            {CONDITION_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {condition==="Diğer"&&<input value={condCustom} onChange={e=>setCondCustom(e.target.value)} style={{...S.input,marginTop:6}} placeholder="Açıklayın..."/>}
          <FL>Tedavi</FL>
          <textarea value={treatment} onChange={e=>setTreatment(e.target.value)} rows={2} style={{...S.input,resize:"vertical"}} placeholder="İlaç, doz, işlem..."/>
          <FL>Tedavi Süresi (gün)</FL>
          <div style={{display:"flex",gap:6}}>
            {[0,1,2,3,4,5].map(d=><button key={d} onClick={()=>setTxDays(d)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px solid ${txDays===d?"#4A7C3F":"#E8E5DC"}`,background:txDays===d?"#E3F0DC":"#fff",color:txDays===d?"#3D5A25":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>{d===0?"—":d}</button>)}
          </div>
          <FL>Başlangıç Tarihi *</FL>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={S.input}/>
          <FL>Notlar</FL>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical"}}/>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setShowForm(false);reset();}} style={{...S.btnOutline,flex:1,padding:11}}>İptal</button>
            <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:11,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({local.length})</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {filtered.length===0 && <Empty text="Toplu tedavi kaydı yok"/>}
      {[...filtered].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(gt=>{
        const b=BREEDS.find(x=>x.id===gt.breed);
        const days=treatmentDaysData.filter(d=>d.healthRecordId===gt.id).sort((a,b)=>a.dayNumber-b.dayNumber);
        const doneDays=days.filter(d=>d.done).length;
        return (
          <div key={gt.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${b?.color}22`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {gt.category==="oglak"?"🍼 Oğlak":"🐐 Anaç"} · {gt.groupName}{gt.startDate?` · 📅 ${fmt(gt.startDate)}`:""}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>{gt.condition}</div>
                {gt.treatment&&<div style={{fontSize:12,color:"#333",marginTop:2}}>💊 {gt.treatment}</div>}
                {days.length>0&&<div style={{fontSize:10,background:"#E3F0DC",color:"#3D5A25",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                  📅 {doneDays}/{days.length} gün · {doneDays<days.length?`${doneDays+1}. günde`:"Tamamlandı"}
                </div>}
                {gt.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:2}}>📝 {gt.notes}</div>}
                <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {gt.createdBy}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                <StatusBadge status={gt.status}/>
                {isVet&&<button onClick={()=>del(gt.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
              </div>
            </div>
            {days.length>0&&(
              <div style={{borderTop:"1px solid #F2F0EA",paddingTop:8}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {days.map(day=>{
                    const isPast=day.plannedDate<today;
                    const isToday=day.plannedDate===today;
                    const isFuture=day.plannedDate>today;
                    return (
                      <div key={day.id} style={{flex:1,minWidth:55,borderRadius:8,padding:"6px 8px",textAlign:"center",
                        background:day.done?"#E3F0DC":isToday?"#EEF6FC":isPast?"#FFF0EE":"#F9F9F6",
                        border:`1.5px solid ${day.done?"#4A7C3F":isToday?"#2873A8":isPast?"#F5C0BA":"#E8E5DC"}`}}>
                        <div style={{fontSize:11,fontWeight:700,color:day.done?"#3D5A25":isToday?"#2873A8":isPast?"#BE3B31":"#aaa"}}>
                          {day.done?"✅":isToday?"🔵":isPast?"⚠️":"⏳"} {day.dayNumber}.gün
                        </div>
                        {day.done&&<div style={{fontSize:9,color:"#3D5A25"}}>{day.doneBy}</div>}
                        {!day.done&&!isFuture&&(
                          <button onClick={()=>markDay(day)} disabled={markingDay===day.id}
                            style={{marginTop:4,padding:"3px 6px",borderRadius:6,background:"#4A7C3F",color:"#fff",border:"none",fontSize:9,cursor:"pointer",width:"100%"}}>
                            {markingDay===day.id?"...":"Yapıldı"}
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
function BirthModal({ onSave, onClose, currentUser }) {
  const [breed, setBreed] = useState("");
  const [motherEarTag, setMotherEarTag] = useState("");
  const [birthType, setBirthType] = useState("");
  const [birthDate, setBirthDate] = useState(todayISO());
  const [kidCount, setKidCount] = useState(0);
  const [kids, setKids] = useState([]);
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const updateKidCount = (n) => {
    setKidCount(n);
    const newKids = Array.from({length:n}, (_,i) => kids[i] || {earTag:"", gender:"dişi"});
    setKids(newKids);
  };

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!motherEarTag.trim()){setErr("Ana hayvan küpe no giriniz");return;}
    if(!birthType){setErr("Doğum türü seçiniz");return;}
    if(!birthDate){setErr("Tarih giriniz");return;}
    setSaving(true);
    const record = {
      id:"b"+Date.now(), breed, mother_ear_tag:motherEarTag.trim(),
      birth_type:birthType, birth_date:birthDate,
      kid_count:kidCount, kids:JSON.stringify(kids),
      notes:notes||null, created_by:currentUser
    };
    const {error} = await sb.from("births").insert(record);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({id:record.id, breed, motherEarTag:motherEarTag.trim(), birthType, birthDate, kidCount, kids, notes, createdBy:currentUser, createdAt:new Date().toISOString()});
  };

  const BtnGroup = ({label, options, value, onChange, colorMap}) => (
    <div>
      <FL>{label}</FL>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {options.map(([v,l])=>{
          const sel=value===v;
          const c=colorMap?.[v]||{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"};
          return <button key={v} onClick={()=>onChange(v)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${sel?c.border:"#E8E5DC"}`,background:sel?c.bg:"#fff",color:sel?c.color:"#8c8c7e",fontWeight:sel?700:400,fontSize:12,cursor:"pointer",minWidth:60}}>{l}</button>;
        })}
      </div>
    </div>
  );

  return <ModalWrap title="🐣 Yeni Doğum Kaydı" onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <BtnGroup label="Irk *" options={BREEDS.map(b=>[b.id,b.emoji+" "+b.name])} value={breed} onChange={setBreed}
      colorMap={{saanen:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"},honamli:{bg:"#F0E6F6",color:"#5B2D8E",border:"#7B4B94"},halep:{bg:"#FFF0E6",color:"#7A3B1E",border:"#B8602A"}}}/>
    <FL>Ana Hayvan Küpe No *</FL>
    <input value={motherEarTag} onChange={e=>setMotherEarTag(e.target.value)} style={S.input} placeholder="TR-15-0042"/>
    <BtnGroup label="Doğum Türü *" options={[["normal","✅ Normal"],["gunsuz","⚠️ Günsüz"],["atik","❌ Atık"]]} value={birthType} onChange={v=>{setBirthType(v);if(v==="atik"){setKidCount(0);setKids([]);}}}
      colorMap={{normal:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"},gunsuz:{bg:"#FFF8EC",color:"#B8750A",border:"#D4850A"},atik:{bg:"#FFF0EE",color:"#BE3B31",border:"#BE3B31"}}}/>
    {birthType!=="atik" && <>
      <BtnGroup label="Yavru Sayısı" options={[[1,"1"],[2,"2"],[3,"3"],[4,"4"]]} value={kidCount} onChange={updateKidCount}
        colorMap={{1:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"},2:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"},3:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"},4:{bg:"#E3F0DC",color:"#3D5A25",border:"#4A7C3F"}}}/>
      {kids.map((kid,i)=>(
        <div key={i} style={{background:"#F5FAF0",borderRadius:10,padding:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#3D5A25",marginBottom:6}}>🍼 {i+1}. Yavru</div>
          <FL>Küpe No</FL>
          <input value={kid.earTag} onChange={e=>{const k=[...kids];k[i]={...k[i],earTag:e.target.value};setKids(k);}} style={S.input} placeholder="TR-15-0101"/>
          <FL>Cinsiyet</FL>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            {[["dişi","♀ Dişi"],["erkek","♂ Erkek"]].map(([v,l])=>(
              <button key={v} onClick={()=>{const k=[...kids];k[i]={...k[i],gender:v};setKids(k);}}
                style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${kid.gender===v?"#4A7C3F":"#E8E5DC"}`,background:kid.gender===v?"#E3F0DC":"#fff",color:kid.gender===v?"#3D5A25":"#8c8c7e",fontWeight:kid.gender===v?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
      ))}
    </>}
    <FL>Tarih *</FL>
    <input type="date" value={birthDate} onChange={e=>setBirthDate(e.target.value)} style={S.input}/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

// ── Doğum Kayıtları Sayfası ──
function BirthsPage({ births, currentUser, onDelete }) {
  const [selBreed, setSelBreed] = useState("all");
  const [showModal, setShowModal] = useState(false);
  const [localBirths, setLocalBirths] = useState(births);
  const isVet = currentUser==="Veteriner Hekim";

  useEffect(()=>setLocalBirths(births),[births]);

  const filtered = selBreed==="all" ? localBirths : localBirths.filter(b=>b.breed===selBreed);
  const sorted = [...filtered].sort((a,b)=>new Date(b.birthDate)-new Date(a.birthDate));

  const stats = {
    total: localBirths.length,
    normal: localBirths.filter(b=>b.birthType==="normal").length,
    atik: localBirths.filter(b=>b.birthType==="atik").length,
    kids: localBirths.reduce((s,b)=>s+(b.kidCount||0),0),
  };

  const deleteBirth = async (id) => {
    await sb.from("births").delete().eq("id",id);
    setLocalBirths(p=>p.filter(b=>b.id!==id));
    onDelete(id);
  };

  const typeLabel = {normal:"Normal",gunsuz:"Günsüz",atik:"Atık"};
  const typeBg = {normal:{bg:"#E3F0DC",color:"#3D5A25"},gunsuz:{bg:"#FFF8EC",color:"#B8750A"},atik:{bg:"#FFF0EE",color:"#BE3B31"}};

  return (
    <div className="anim-fade">
      {showModal && <BirthModal currentUser={currentUser}
        onSave={b=>{setLocalBirths(p=>[b,...p]);setShowModal(false);}}
        onClose={()=>setShowModal(false)}/>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={S.title}>🐣 Doğum Kayıtları</h2>
        <button onClick={()=>setShowModal(true)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>+ Ekle</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        <Stat v={stats.total} l="Toplam" bg="#E8E5DC" c="#444"/>
        <Stat v={stats.normal} l="Normal" bg="#E3F0DC" c="#3D5A25"/>
        <Stat v={stats.atik} l="Atık" bg="#FFF0EE" c="#BE3B31"/>
        <Stat v={stats.kids} l="Yavru" bg="#EEF6FC" c="#2873A8"/>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({localBirths.length})</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {sorted.length===0 && <Empty text="Henüz doğum kaydı yok"/>}
      {sorted.map(birth=>{
        const b=BREEDS.find(x=>x.id===birth.breed);
        const tc=typeBg[birth.birthType]||{bg:"#F2F0EA",color:"#555"};
        const kids = typeof birth.kids==="string" ? JSON.parse(birth.kids||"[]") : (birth.kids||[]);
        return (
          <div key={birth.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${b?.color}22`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · 📅 {fmt(birth.birthDate)}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>Ana: {birth.motherEarTag}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{background:tc.bg,color:tc.color,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>{typeLabel[birth.birthType]}</span>
                {isVet && <button onClick={()=>deleteBirth(birth.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
              </div>
            </div>
            {kids.length>0 && (
              <div style={{borderTop:"1px solid #F2F0EA",paddingTop:8}}>
                <div style={{fontSize:11,color:"#8c8c7e",marginBottom:6,fontWeight:600}}>{kids.length} Yavru:</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {kids.map((kid,i)=>(
                    <div key={i} style={{background:"#F5FAF0",borderRadius:8,padding:"5px 10px",minWidth:90}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#3D5A25"}}>🍼 {kid.earTag||"—"}</div>
                      <div style={{fontSize:10,color:"#8c8c7e"}}>{kid.gender==="dişi"?"♀ Dişi":"♂ Erkek"}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {birth.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:6}}>📝 {birth.notes}</div>}
            <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {birth.createdBy}</div>
          </div>
        );
      })}
    </div>
  );
}
function MiniPill({label,val,color}){return <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,fontWeight:900,color}}>{val}</span><span style={{fontSize:10,color:"#8c8c7e"}}>{label}</span></div>;}
function PillTag({bg,color,text}){return <span style={{background:bg,color,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:8,whiteSpace:"nowrap"}}>{text}</span>;}

// ── Raporlar ──
function ReportsPage({reports, goats, logs, vaccineReports, births, deaths, groupTreatments, treatmentDaysData, currentUser, onDeleteReport}) {
  const [mainTab, setMainTab] = useState("saglik");
  const [selBreed, setSelBreed] = useState("all");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [expandedReport, setExpandedReport] = useState(null);
  const [vaccineReportsLocal, setVaccineReportsLocal] = useState(vaccineReports);
  useEffect(()=>{ setVaccineReportsLocal(vaccineReports); },[vaccineReports]);
  const isVet = currentUser==="Veteriner Hekim";

  const filtered = selBreed==="all" ? reports : reports.filter(r=>r.breed===selBreed);
  const sorted = [...filtered].sort((a,b)=>new Date(b.dateClosed)-new Date(a.dateClosed));
  const stats = {
    total: reports.length,
    iyilesti: reports.filter(r=>["İyileşti","Tedavi Tamamlandı"].includes(r.closeReason)).length,
    oldu: reports.filter(r=>r.closeReason==="Hayvan Öldü").length,
  };

  const filteredVR = (selBreed==="all" ? vaccineReportsLocal : vaccineReportsLocal.filter(r=>r.breed===selBreed))
    .filter(r=>r.recordType==="uygulama" || r.status==="uygulandı");
  const sortedVR = [...filteredVR].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const filteredBirths = selBreed==="all" ? births : births.filter(b=>b.breed===selBreed);
  const filteredDeaths = selBreed==="all" ? deaths : deaths.filter(d=>d.breed===selBreed);
  const filteredGT = selBreed==="all" ? groupTreatments : groupTreatments.filter(g=>g.breed===selBreed);

  const handleDelete = async (id) => {
    await sb.from("reports").delete().eq("id", id);
    onDeleteReport(id);
    setConfirmDelete(null);
  };

  return (
    <div className="anim-fade">
      {confirmDelete && (
        <div onClick={()=>setConfirmDelete(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:320}}>
            <div style={{fontWeight:800,fontSize:16,color:"#1e1e1e",marginBottom:8}}>🗑 Raporu Sil</div>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>Bu rapor kalıcı olarak silinecek. Emin misiniz?</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDelete(null)} style={{...S.btnOutline,flex:1,padding:10}}>İptal</button>
              <button onClick={()=>handleDelete(confirmDelete)} style={{...S.btnPrimary,flex:1,padding:10,background:"#BE3B31"}}>Evet, Sil</button>
            </div>
          </div>
        </div>
      )}

      <h2 style={{...S.title,marginBottom:12}}>📊 Raporlar</h2>

      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {[["saglik","🩺","Sağlık","#BE3B31"],["asi","💉","Aşı","#2873A8"],["dogum","🐣","Doğum","#B8750A"],["olum","💀","Ölüm","#555"],["toplu","🏥","Toplu Tx","#4A7C3F"]].map(([k,ic,l,c])=>(
          <button key={k} onClick={()=>setMainTab(k)} style={{...S.btnSm,background:mainTab===k?c:"#F2F0EA",color:mainTab===k?"#fff":"#555",whiteSpace:"nowrap",padding:"7px 14px",fontSize:12}}>
            {ic} {l}
          </button>
        ))}
      </div>

      {/* Irk filtresi */}
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {/* SAĞLIK RAPORLARI */}
      {mainTab==="saglik" && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
            <Stat v={stats.total} l="Toplam" bg="#E8E5DC" c="#444"/>
            <Stat v={stats.iyilesti} l="İyileşti" bg="#E3F0DC" c="#3D5A25"/>
            <Stat v={stats.oldu} l="Öldü" bg="#FFF0EE" c="#BE3B31"/>
          </div>
          {sorted.length===0 && <Empty text="Henüz sağlık raporu yok"/>}
          {sorted.map(r=>{
            const b=BREEDS.find(x=>x.id===r.breed);
            const isDeath=r.closeReason==="Hayvan Öldü";

            return (
              <div key={r.id} style={{...S.card,padding:12,marginBottom:6,border:`1.5px solid ${isDeath?"#F5C0BA":b?.color+"22"}`}}>

                    <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {r.goatName} {r.goatEarTag?`(${r.goatEarTag})`:""}</div>

                </div>
                {r.treatment&&<div style={{fontSize:12,color:"#333",marginBottom:4}}>💊 {r.treatment}</div>}
                {r.closeNote&&<div style={{fontSize:12,color:"#555",fontStyle:"italic",marginBottom:4}}>📝 {r.closeNote}</div>}
                <div style={{fontSize:10,color:"#aaa",marginBottom:8}}>Ekleyen: {r.createdByName}</div>
                <button onClick={()=>setExpandedReport(isExpanded?null:r.id)}
                  style={{...S.btnSm,background:"#F2F0EA",color:"#555",fontSize:11,width:"100%",padding:"6px 0",textAlign:"center"}}>

                      <div key={l.id} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<rLogs.length-1?"1px dashed #F2F0EA":"none"}}>

                          {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between"}}>
                            <div style={{fontSize:11,fontWeight:700,color:"#333"}}>{l.userName}</div>
                            <div style={{fontSize:10,color:"#aaa"}}>{fmtDT(l.createdAt)}</div>
                          </div>
                          <div style={{fontSize:11,color:"#555",marginTop:1}}>{l.actionDetail}</div>

                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* AŞI RAPORLARI */}
      {mainTab==="asi" && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:12}}>
            <Stat v={vaccineReports.length} l="Toplam Uygulama" bg="#EEF6FC" c="#2873A8"/>
            <Stat v={vaccineReports.reduce((s,r)=>s+(r.goatCount||0),0)} l="Toplam Doz" bg="#E3F0DC" c="#3D5A25"/>
          </div>
          {sortedVR.length===0 && <Empty text="Henüz aşı raporu yok"/>}
          {sortedVR.map(r=>{
            const b=BREEDS.find(x=>x.id===r.breed);
            const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
            return (
              <div key={r.id} style={{...S.card,padding:12,marginBottom:6,border:`1.5px solid ${vt?.color||"#E8E5DC"}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {r.groupName}</div>
                    <div style={{fontWeight:800,fontSize:14,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                    {r.goatCount>0&&<div style={{fontSize:11,color:"#555",marginTop:1}}>👥 {r.goatCount} hayvan: {r.goatNames}</div>}
                    <div style={{fontSize:11,color:"#8c8c7e"}}>📅 {fmt(r.date)}{r.batchNo?` · Parti: ${r.batchNo}`:""}</div>
                    <div style={{fontSize:11,color:"#3D5A25",fontWeight:600,marginTop:2}}>✅ Uygulayan: {r.appliedBy||r.createdBy}</div>
                    <div style={{fontSize:10,color:"#aaa",marginTop:1}}>Ekleyen: {r.createdBy}{r.appliedAt?` · ${fmtDT(r.appliedAt)}`:""}</div>
                  </div>
                  {isVet && (
                    <button onClick={async()=>{
                      if(window.confirm("Bu aşı raporu silinecek. Emin misiniz?")){
                        const {error} = await sb.from("vaccine_reports").delete().eq("id",r.id);
                        if(!error) setVaccineReportsLocal(p=>p.filter(x=>x.id!==r.id));
                      }
                    }} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:10,padding:"3px 8px",flexShrink:0,marginLeft:8}}>🗑 Sil</button>
                  )}
                </div>
                {r.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:4}}>📝 {r.notes}</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* DOĞUM RAPORLARI */}
      {mainTab==="dogum" && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
            <Stat v={filteredBirths.length} l="Toplam" bg="#E8E5DC" c="#444"/>
            <Stat v={filteredBirths.filter(b=>b.birthType==="normal").length} l="Normal" bg="#E3F0DC" c="#3D5A25"/>
            <Stat v={filteredBirths.filter(b=>b.birthType==="atik").length} l="Atık" bg="#FFF0EE" c="#BE3B31"/>
          </div>
          {filteredBirths.length===0&&<Empty text="Doğum kaydı yok"/>}
          {[...filteredBirths].sort((a,b)=>new Date(b.birthDate)-new Date(a.birthDate)).map(birth=>{
            const br=BREEDS.find(x=>x.id===birth.breed);
            const kids=typeof birth.kids==="string"?JSON.parse(birth.kids||"[]"):(birth.kids||[]);
            const typeBg={normal:{bg:"#E3F0DC",c:"#3D5A25"},gunsuz:{bg:"#FFF8EC",c:"#B8750A"},atik:{bg:"#FFF0EE",c:"#BE3B31"}};
            const tc=typeBg[birth.birthType]||{bg:"#F2F0EA",c:"#555"};
            return (
              <div key={birth.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${br?.color}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:br?.color}}>{br?.emoji} {br?.name} · 📅 {fmt(birth.birthDate)}</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>Ana: {birth.motherEarTag}</div>
                    {birth.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic"}}>📝 {birth.notes}</div>}
                  </div>
                  <span style={{background:tc.bg,color:tc.c,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>{birth.birthType==="normal"?"Normal":birth.birthType==="gunsuz"?"Günsüz":"Atık"}</span>
                </div>
                {kids.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {kids.map((k,i)=><div key={i} style={{background:"#F5FAF0",borderRadius:8,padding:"4px 10px",fontSize:11}}>🍼 {k.earTag||"—"} · {k.gender==="dişi"?"♀":"♂"}</div>)}
                </div>}
                <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {birth.createdBy}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* ÖLÜM RAPORLARI */}
      {mainTab==="olum" && (
        <div>
          <div style={{marginBottom:10}}><Stat v={filteredDeaths.length} l="Toplam Ölüm" bg="#FFF0EE" c="#BE3B31"/></div>
          {filteredDeaths.length===0&&<Empty text="Ölüm kaydı yok"/>}
          {[...filteredDeaths].sort((a,b)=>new Date(b.deathDate)-new Date(a.deathDate)).map(d=>{
            const br=BREEDS.find(x=>x.id===d.breed);
            return (
              <div key={d.id} style={{...S.card,padding:12,marginBottom:8,border:"1.5px solid #F5C0BA"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:br?.color}}>{br?.emoji} {br?.name} · {d.category==="oglak"?"🍼 Oğlak":"🐐 Anaç"} · 📅 {fmt(d.deathDate)}{d.deathTime?` · ⏰ ${d.deathTime}`:""}</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>Küpe: {d.earTag}</div>
                    <div style={{fontSize:12,color:"#BE3B31",fontWeight:600}}>☠️ {d.cause}</div>
                    {d.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic"}}>📝 {d.notes}</div>}
                    <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {d.createdBy}</div>
                  </div>
                  <span style={{background:"#FFF0EE",color:"#BE3B31",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>Öldü</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* TOPLU TEDAVİ RAPORLARI */}
      {mainTab==="toplu" && (
        <div>
          <div style={{marginBottom:10}}><Stat v={filteredGT.length} l="Toplam Kayıt" bg="#E3F0DC" c="#3D5A25"/></div>
          {filteredGT.length===0&&<Empty text="Toplu tedavi kaydı yok"/>}
          {[...filteredGT].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).map(gt=>{
            const br=BREEDS.find(x=>x.id===gt.breed);
            const days=(treatmentDaysData||[]).filter(d=>d.healthRecordId===gt.id);
            const doneDays=days.filter(d=>d.done).length;
            return (
              <div key={gt.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${br?.color}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:br?.color}}>{br?.emoji} {br?.name} · {gt.category==="oglak"?"🍼 Oğlak":"🐐 Anaç"} · {gt.groupName}</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>{gt.condition}</div>
                    {gt.treatment&&<div style={{fontSize:12,color:"#333"}}>💊 {gt.treatment}</div>}
                    {gt.startDate&&<div style={{fontSize:11,color:"#8c8c7e"}}>📅 {fmt(gt.startDate)}</div>}
                    {days.length>0&&<div style={{fontSize:10,background:"#E3F0DC",color:"#3D5A25",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                      📅 {doneDays}/{days.length} gün · {doneDays<days.length?`${doneDays+1}. günde`:"Tamamlandı"}
                    </div>}
                    {gt.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:2}}>📝 {gt.notes}</div>}
                    <div style={{fontSize:10,color:"#aaa",marginTop:4}}>Ekleyen: {gt.createdBy}</div>
                  </div>
                  <StatusBadge status={gt.status}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}
