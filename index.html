// ── Grup Aşı Modal ──
function GroupVaccineModal({ group, goats, onSave, onClose, currentUser }) {
  const groupGoats = goats.filter(g=>group.memberIds.includes(g.id)&&!g.archived);
  const [vaccineType, setVaccineType] = useState("");
  const [date, setDate] = useState(todayISO());
  const [batchNo, setBatchNo] = useState("");
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!vaccineType){setErr("Aşı türü seçiniz");return;}
    setSaving(true);
    const report = {
      id:"vr"+Date.now(),
      group_id: group.id,
      group_name: group.name,
      breed: group.breed,
      vaccine_type: vaccineType,
      date, batch_no: batchNo||null,
      goat_ids: groupGoats.map(g=>g.id).join(","),
      goat_names: groupGoats.length>0 ? groupGoats.map(g=>g.name).join(", ") : "—",
      goat_count: groupGoats.length,
      created_by: currentUser,
      notes: notes||null,
      record_type: "uygulama",
    };
    const {error} = await sb.from("vaccine_reports").insert(report);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({...report, goatCount:report.goat_count, createdBy:report.created_by, batchNo:report.batch_no, vaccineType:report.vaccine_type, groupName:report.group_name, groupId:report.group_id});
  };

  return <ModalWrap title={`💉 ${group.name} — Aşı Uygula`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <div style={{background:"#F5FAF0",borderRadius:10,padding:10,marginBottom:4}}>
      <div style={{fontSize:12,fontWeight:700,color:"#3D5A25",marginBottom:2}}>👥 {group.name}</div>
      {group.description&&<div style={{fontSize:11,color:"#8c8c7e"}}>{group.description}</div>}
      {groupGoats.length>0&&<div style={{fontSize:11,color:"#555",marginTop:2}}>{groupGoats.length} hayvan: {groupGoats.map(g=>g.name).join(", ")}</div>}
    </div>
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {VACCINE_TYPES_EXT.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
    </select>
    <FL>Tarih *</FL>
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Parti / Seri No</FL>
    <input value={batchNo} onChange={e=>setBatchNo(e.target.value)} style={S.input} placeholder="örn. VAK-2026-A1"/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>
        {saving?"Kaydediliyor...":"💉 Uygula"}
      </button>
    </div>
  </ModalWrap>;
}

// ── Gruba Hayvan Ekle Modal ──
function AddMembersModal({ group, breed, goats, onSave, onClose }) {
  const breedGoats = goats.filter(g=>g.breed===breed.id&&!g.archived);
  const [selected, setSelected] = useState(new Set(group.memberIds||[]));
  const [saving, setSaving] = useState(false);

  const toggle = id => setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  const save = async () => {
    setSaving(true);
    // Mevcut üyeleri sil, yeniden ekle
    await sb.from("vaccine_group_members").delete().eq("group_id", group.id);
    if(selected.size>0){
      const members=[...selected].map(goatId=>({id:"gm"+Date.now()+Math.random().toString(36).slice(2),group_id:group.id,goat_id:goatId}));
      await sb.from("vaccine_group_members").insert(members);
    }
    onSave({...group, memberIds:[...selected]});
    setSaving(false);
  };

  return <ModalWrap title={`👥 ${group.name} — Hayvanlar`} onClose={onClose}>
    <div style={{fontSize:12,color:"#8c8c7e",marginBottom:8}}>{selected.size} hayvan seçili</div>
    {breedGoats.length===0 && <div style={{fontSize:12,color:"#aaa",textAlign:"center",padding:12}}>Bu ırkta henüz hayvan yok</div>}
    {breedGoats.map(g=>{
      const sel=selected.has(g.id);
      return <div key={g.id} onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E8E5DC"}`,cursor:"pointer",marginBottom:4}}>
        <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#ccc"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
        </div>
        <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#444"}}>{g.name}</span>
        <span style={{fontSize:10,color:"#8c8c7e",marginLeft:"auto"}}>{g.earTag} · {g.category==="anac"?"Anaç":"Oğlak"}</span>
      </div>;
    })}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}
function CreateGroupModal({ breed, goats, onSave, onClose, currentUser }) {
  const breedGoats = goats.filter(g=>g.breed===breed.id&&!g.archived);
  const [name, setName] = useState("");
  const [desc, setDesc] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const toggle = id => setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  const save = async () => {
    if(!name.trim()){setErr("Grup adı giriniz");return;}
    setSaving(true);
    const groupId = "grp"+Date.now();
    const group = {id:groupId, breed:breed.id, name:name.trim(), description:desc||null, created_by:currentUser};
    const {error} = await sb.from("vaccine_groups").insert(group);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    if(selected.size>0){
      const members = [...selected].map(goatId=>({id:"gm"+Date.now()+Math.random().toString(36).slice(2), group_id:groupId, goat_id:goatId}));
      await sb.from("vaccine_group_members").insert(members);
    }
    onSave({...group, memberIds:[...selected]});
    setSaving(false);
  };

  const anacList = breedGoats.filter(g=>g.category==="anac");
  const oglakList = breedGoats.filter(g=>g.category==="oglak");

  const GoatRow = ({g}) => {
    const sel=selected.has(g.id);
    return <div onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E8E5DC"}`,cursor:"pointer",marginBottom:4}}>
      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#ccc"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
      </div>
      <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#444"}}>{g.name}</span>
      <span style={{fontSize:10,color:"#8c8c7e",marginLeft:"auto"}}>{g.earTag} · {g.category==="anac"?"Anaç":"Oğlak"}</span>
    </div>;
  };

  return <ModalWrap title={`➕ ${breed.emoji} ${breed.name} — Yeni Grup`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Grup Adı *</FL>
    <input value={name} onChange={e=>setName(e.target.value)} style={S.input} placeholder="örn. Saanen Oğlakları"/>
    <FL>Açıklama</FL>
    <input value={desc} onChange={e=>setDesc(e.target.value)} style={S.input} placeholder="İsteğe bağlı..."/>
    <FL>Hayvan Seç (opsiyonel — sonradan da eklenebilir)</FL>
    <div style={{fontSize:11,color:"#8c8c7e",marginBottom:8}}>{selected.size} hayvan seçildi</div>
    {breedGoats.length===0 && <div style={{fontSize:12,color:"#aaa",textAlign:"center",padding:8,background:"#F9F9F6",borderRadius:8}}>Bu ırkta henüz hayvan yok</div>}
    {anacList.length>0&&<>
      <div style={{fontSize:11,fontWeight:700,color:"#3D5A25",marginBottom:4,marginTop:4}}>🐐 Anaçlar</div>
      {anacList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    {oglakList.length>0&&<>
      <div style={{fontSize:11,fontWeight:700,color:"#8B5A1B",marginBottom:4,marginTop:8}}>🍼 Oğlaklar</div>
      {oglakList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"✅ Grup Oluştur"}</button>
    </div>
  </ModalWrap>;
}

// ── Irk Aşı Sekmesi (Grup Sistemi) ──
function BreedVaccineTab({breed, goats, vaccineGroups, vaccineReports, onGroupCreated, onGroupUpdated, onGroupDeleted, onVaccineApplied, currentUser}){
  const [showCreateGroup, setShowCreateGroup] = useState(false);
  const [activeGroupVaccine, setActiveGroupVaccine] = useState(null);
  const [editMembersGroup, setEditMembersGroup] = useState(null);
  const [confirmDeleteGroup, setConfirmDeleteGroup] = useState(null);
  const [viewTab, setViewTab] = useState("gruplar");
  const isVet = currentUser==="Veteriner Hekim";

  const breedGroups = vaccineGroups.filter(g=>g.breed===breed.id);
  const breedReports = [...vaccineReports].filter(r=>r.breed===breed.id).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const activeGroup = activeGroupVaccine ? breedGroups.find(g=>g.id===activeGroupVaccine) : null;
  const editGroup = editMembersGroup ? breedGroups.find(g=>g.id===editMembersGroup) : null;

  const deleteGroup = async (groupId) => {
    await sb.from("vaccine_group_members").delete().eq("group_id", groupId);
    await sb.from("vaccine_groups").delete().eq("id", groupId);
    onGroupDeleted(groupId);
    setConfirmDeleteGroup(null);
  };

  return (
    <div>
      {confirmDeleteGroup && (
        <div onClick={()=>setConfirmDeleteGroup(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,width:"100%",maxWidth:320}}>
            <div style={{fontWeight:800,fontSize:16,color:"#1e1e1e",marginBottom:8}}>🗑 Grubu Sil</div>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>
              <b>{breedGroups.find(g=>g.id===confirmDeleteGroup)?.name}</b> grubu kalıcı silinecek. Emin misiniz?
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDeleteGroup(null)} style={{...S.btnOutline,flex:1,padding:10}}>İptal</button>
              <button onClick={()=>deleteGroup(confirmDeleteGroup)} style={{...S.btnPrimary,flex:1,padding:10,background:"#BE3B31",border:"none"}}>Evet, Sil</button>
            </div>
          </div>
        </div>
      )}
      {showCreateGroup && <CreateGroupModal breed={breed} goats={goats} currentUser={currentUser}
        onSave={g=>{onGroupCreated(g);setShowCreateGroup(false);}}
        onClose={()=>setShowCreateGroup(false)}/>}
      {activeGroup && <GroupVaccineModal group={activeGroup} goats={goats} currentUser={currentUser}
        onSave={r=>{onVaccineApplied(r);setActiveGroupVaccine(null);}}
        onClose={()=>setActiveGroupVaccine(null)}/>}
      {editGroup && <AddMembersModal group={editGroup} breed={breed} goats={goats}
        onSave={updatedGroup=>{onGroupUpdated(updatedGroup);setEditMembersGroup(null);}}
        onClose={()=>setEditMembersGroup(null)}/>}

      <button onClick={()=>setShowCreateGroup(true)} style={{...S.btnOutline,width:"100%",marginBottom:10,fontSize:13}}>➕ Yeni Grup Oluştur</button>

      <div style={{display:"flex",background:"#fff",borderRadius:10,marginBottom:10,border:"1px solid #E8E5DC",overflow:"hidden"}}>
        <button onClick={()=>setViewTab("gruplar")} style={{...S.tabBtn,background:viewTab==="gruplar"?breed.color:"transparent",color:viewTab==="gruplar"?"#fff":"#8c8c7e",fontSize:12}}>👥 Gruplar</button>
        <button onClick={()=>setViewTab("gecmis")} style={{...S.tabBtn,background:viewTab==="gecmis"?breed.color:"transparent",color:viewTab==="gecmis"?"#fff":"#8c8c7e",fontSize:12}}>📋 Aşı Geçmişi</button>
      </div>

      {viewTab==="gruplar" && (
        <div>
          {breedGroups.length===0 && <Empty text="Henüz grup oluşturulmadı. ➕ butonuna basın."/>}
          {breedGroups.map(group=>{
            const memberGoats = goats.filter(g=>group.memberIds.includes(g.id)&&!g.archived);
            const lastVaccine = breedReports.filter(r=>r.groupId===group.id)[0];
            return (
              <div key={group.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${breed.color}33`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,color:breed.color}}>{group.name}</div>
                    {group.description&&<div style={{fontSize:11,color:"#8c8c7e"}}>{group.description}</div>}
                    <div style={{fontSize:11,color:"#555",marginTop:2}}>👥 {memberGoats.length} hayvan {memberGoats.length>0?`· ${memberGoats.map(g=>g.name).join(", ")}`:""}  </div>
                  </div>
                  {isVet && (
                    <button onClick={()=>setConfirmDeleteGroup(group.id)}
                      style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:11,padding:"4px 8px",flexShrink:0}}>🗑</button>
                  )}
                </div>
                {lastVaccine && (
                  <div style={{fontSize:11,color:"#4A7C3F",background:"#F5FAF0",padding:"4px 8px",borderRadius:6,marginBottom:8}}>

                  </div>
                )}
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setEditMembersGroup(group.id)} style={{...S.btnOutline,width:"100%",fontSize:12,padding:"8px 0"}}>
                    👥 Hayvanlar ({memberGoats.length})
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {viewTab==="gecmis" && (
        <div>

// ── Aşı Takvim Kaydı Ekle Modal ──
function VaccineScheduleModal({ breed, vaccineGroups, onSave, onClose, currentUser }) {
  const breedGroups = vaccineGroups.filter(g=>g.breed===breed.id);
  const [groupId, setGroupId] = useState("");
  const [vaccineType, setVaccineType] = useState("");
  const [date, setDate] = useState("");
  const [batchNo, setBatchNo] = useState("");
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if(!groupId){setErr("Grup seçiniz");return;}
    if(!vaccineType){setErr("Aşı türü seçiniz");return;}
    if(!date){setErr("Tarih giriniz");return;}
    setSaving(true);
    const group = breedGroups.find(g=>g.id===groupId);
    const report = {
      id:"vr"+Date.now(),
      group_id: groupId,
      group_name: group?.name||"",
      breed: breed.id,
      vaccine_type: vaccineType,
      date, batch_no: batchNo||null,
      goat_ids:"", goat_names:"", goat_count:0,
      created_by: currentUser,
      notes: notes||null,
      record_type: "takvim",
    };
    const {error} = await sb.from("vaccine_reports").insert(report);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({...report, groupId:report.group_id, groupName:report.group_name, vaccineType:report.vaccine_type, batchNo:report.batch_no||"", goatCount:0, createdBy:report.created_by, notes:report.notes||""});
  };

  return (
    <div className="anim-fade" style={{background:"#FAFAF5",minHeight:"100vh",padding:"0 0 20px"}}>
      <div style={{background:"#4A7C3F",padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:200}}>
        <button onClick={onClose} style={{...S.ghost,color:"#fff",fontSize:22,padding:"0 6px 0 0"}}>‹</button>
        <div style={{color:"#fff",fontWeight:800,fontSize:15}}>{breed.emoji} {breed.name} — Takvime Ekle</div>
      </div>
      <div style={{padding:"16px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {err&&<ErrBox msg={err}/>}
        {breedGroups.length===0 && (
          <div style={{background:"#FFF8EC",border:"1px solid #F0D49A",borderRadius:10,padding:12,fontSize:13,color:"#8B5A1B"}}>
            ⚠️ Bu ırk için henüz grup yok. Önce Sürü → {breed.name} → 💉 Aşı sekmesinden grup oluşturun.
          </div>
        )}
        <FL>Grup *</FL>
        <select value={groupId} onChange={e=>setGroupId(e.target.value)} style={S.select}>
          <option value="">— Grup seçin —</option>
          {breedGroups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
        </select>
        <FL>Aşı Türü *</FL>
        <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}>
          <option value="">— Seçin —</option>
          {VACCINE_TYPES_EXT.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
        </select>
        <FL>Tarih * (ileri tarih girilebilir)</FL>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
        <FL>Parti / Seri No</FL>
        <input value={batchNo} onChange={e=>setBatchNo(e.target.value)} style={S.input} placeholder="örn. VAK-2026-A1"/>
        <FL>Notlar</FL>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} style={{...S.input,resize:"vertical",lineHeight:1.5}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:13}}>İptal</button>
          <button onClick={save} disabled={saving||breedGroups.length===0} style={{...S.btnPrimary,flex:2,padding:13,opacity:(saving||breedGroups.length===0)?.5:1}}>
            {saving?"Kaydediliyor...":"💾 Takvime Ekle"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Global Aşı Sayfası ──
function GlobalVaccinePage({vaccineGroups, vaccineReports, onScheduleAdded, onScheduleDeleted, onVaccineApplied, currentUser}){
  const [selBreed, setSelBreed] = useState(null);
  const [showSchedule, setShowSchedule] = useState(null);
  const [localReports, setLocalReports] = useState(vaccineReports);
  const [applyingId, setApplyingId] = useState(null);
  const isVet = currentUser==="Veteriner Hekim";

  useEffect(()=>setLocalReports(vaccineReports),[vaccineReports]);

  const today = todayISO();

  const deleteReport = async (id) => {
    const {error} = await sb.from("vaccine_reports").delete().eq("id",id);
    if(!error){
      setLocalReports(p=>p.filter(x=>x.id!==id));
      if(onScheduleDeleted) onScheduleDeleted(id);
    }
  };

  const markApplied = async (r) => {
    setApplyingId(r.id);
    const now = new Date().toISOString();
    const appliedDate = now.split("T")[0];

    // Yeni uygulama kaydı oluştur (rapor için)
    const newReport = {
      id: "vr"+Date.now(),
      group_id: r.groupId,
      group_name: r.groupName,
      breed: r.breed,
      vaccine_type: r.vaccineType,
      date: appliedDate,
      batch_no: r.batchNo||null,
      goat_ids: r.goatIds||"",
      goat_names: r.goatNames||"",
      goat_count: r.goatCount||0,
      created_by: r.createdBy,
      notes: r.notes||null,
      record_type: "uygulama",
      status: "uygulandı",
      applied_by: currentUser,
      applied_at: now,
    };

    // 1. Yeni uygulama kaydını Supabase'e ekle
    await sb.from("vaccine_reports").insert(newReport);

    // 2. Eski takvim kaydını Supabase'den sil
    await sb.from("vaccine_reports").delete().eq("id", r.id);

    // 3. State güncelle — takvim kaydını kaldır, yeni raporu ekle
    const newReportObj = {
      ...newReport,
      groupId: newReport.group_id,
      groupName: newReport.group_name,
      vaccineType: newReport.vaccine_type,
      batchNo: newReport.batch_no||"",
      goatCount: newReport.goat_count,
      createdBy: newReport.created_by,
      recordType: "uygulama",
      appliedBy: currentUser,
      appliedAt: now,
    };

    setLocalReports(p=>[newReportObj, ...p.filter(x=>x.id!==r.id)]);
    if(onScheduleDeleted) onScheduleDeleted(r.id);
    if(onVaccineApplied) onVaccineApplied(newReportObj);
    setApplyingId(null);
  };

  if(selBreed) {
    const breed = BREEDS.find(b=>b.id===selBreed);
    const breedReports = [...localReports]
      .filter(r=>r.breed===selBreed && (r.recordType==="takvim" || r.recordType===undefined || r.recordType===""))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    const upcoming = breedReports.filter(r=>r.date>=today);
    const past = breedReports.filter(r=>r.date<today).sort((a,b)=>new Date(b.date)-new Date(a.date));

    return (
      <div className="anim-slide">
        {showSchedule && <div style={{position:"fixed",inset:0,zIndex:500,background:"#FAFAF5"}}>
          <VaccineScheduleModal breed={breed} vaccineGroups={vaccineGroups}
            onSave={r=>{onScheduleAdded(r);setLocalReports(p=>[r,...p]);setShowSchedule(false);}}
            onClose={()=>setShowSchedule(false)} currentUser={currentUser}/>
        </div>}

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>setSelBreed(null)} style={{...S.ghost,fontSize:22,color:"#555",padding:0}}>‹</button>
          <div style={{fontSize:20}}>{breed.emoji}</div>
          <h2 style={{...S.title,margin:0}}>{breed.name} — Aşı Takvimi</h2>
        </div>

        <button onClick={()=>setShowSchedule(true)} style={{...S.btnPrimary,width:"100%",marginBottom:12,fontSize:13}}>
          + Takvime Aşı Ekle
        </button>

        <div style={{fontWeight:700,fontSize:13,color:"#2873A8",marginBottom:8}}>📅 Yaklaşan / Planlanan</div>
        {upcoming.length===0 && <div style={{...S.card,padding:10,marginBottom:8,textAlign:"center",color:"#aaa",fontSize:12}}>Planlanan aşı yok</div>}
        {upcoming.map(r=>{
          const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
          const d=daysUntil(r.date);
          const isUrgent=d<=3;
          const isApplied=r.status==="uygulandı";
          return (
            <div key={r.id} style={{...S.card,padding:10,marginBottom:5,border:`1.5px solid ${isApplied?"#A8D5A2":isUrgent?"#F5C0BA":"#D4E8FF"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                  <div style={{fontSize:11,color:"#555"}}>👥 {r.groupName}</div>
                  <div style={{fontSize:11,color:"#8c8c7e"}}>📅 {fmt(r.date)}{r.batchNo?` · Parti: ${r.batchNo}`:""}</div>
                  {isApplied && <div style={{fontSize:10,color:"#3D5A25",fontWeight:700,marginTop:2}}>✅ Uygulandı · {r.appliedBy} · {fmtDT(r.appliedAt)}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  {!isApplied && <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:900,color:isUrgent?"#BE3B31":"#2873A8"}}>{d}</div>
                    <div style={{fontSize:9,color:isUrgent?"#BE3B31":"#2873A8",fontWeight:700}}>gün kaldı</div>
                  </div>}
                  {isApplied && <PillTag bg="#E3F0DC" color="#3D5A25" text="✅ Uygulandı"/>}
                  {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                    style={{...S.btnPrimary,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                    {applyingId===r.id?"...":"✅ Uygulandı"}
                  </button>}
                  {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                </div>
              </div>
              {r.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:4}}>📝 {r.notes}</div>}
            </div>
          );
        })}

        {past.length>0&&<>
          <div style={{fontWeight:700,fontSize:13,color:"#8c8c7e",marginBottom:8,marginTop:12}}>📋 Geçmiş</div>
          {past.map(r=>{
            const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
            const isApplied=r.status==="uygulandı";
            return (
              <div key={r.id} style={{...S.card,padding:10,marginBottom:5,opacity:.85}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                    <div style={{fontSize:11,color:"#555"}}>👥 {r.groupName}</div>
                    <div style={{fontSize:11,color:"#8c8c7e"}}>📅 {fmt(r.date)} · {r.createdBy}</div>
                    {isApplied && <div style={{fontSize:10,color:"#3D5A25",fontWeight:700}}>✅ Uygulandı · {r.appliedBy}</div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                      style={{...S.btnOutline,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                      {applyingId===r.id?"...":"✅ Uygulandı"}
                    </button>}
                    {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"#FFF0EE",color:"#BE3B31",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </>}
      </div>
    );
  }

  // Ana sayfa — 3 ırk kartı
  return (
    <div className="anim-fade">
      <h2 style={{...S.title,marginBottom:12}}>💉 Aşı Takvimi</h2>
      {BREEDS.map((b,i)=>{
        const breedReports=localReports.filter(r=>r.breed===b.id&&(r.recordType==="takvim"||!r.recordType));
        const upcoming=breedReports.filter(r=>r.date>=today&&r.status!=="uygulandı");
        const urgent=upcoming.filter(r=>daysUntil(r.date)<=3);
        return (
          <div key={b.id} onClick={()=>setSelBreed(b.id)} className="anim-fade"
            style={{...S.card,padding:0,marginBottom:10,cursor:"pointer",overflow:"hidden",border:`1.5px solid ${b.color}22`,animationDelay:`${i*.07}s`}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <div style={{width:64,background:b.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,alignSelf:"stretch"}}>{b.emoji}</div>
              <div style={{flex:1,padding:"14px 16px"}}>
                <div style={{fontWeight:800,fontSize:17,color:b.color,marginBottom:4}}>{b.name}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <PillTag bg="#EEF6FC" color="#2873A8" text={`📅 ${upcoming.length} planlı`}/>
                  {urgent.length>0&&<PillTag bg="#FFF0EE" color="#BE3B31" text={`⚠️ ${urgent.length} acil`}/>}
                </div>
              </div>
              <div style={{padding:"0 14px",color:"#ccc",fontSize:22}}>›</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

                    <div style={{fontSize:11,color:"#8c8c7e",marginTop:1}}>👤 {v.createdByName}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,fontWeight:700,color:d<=15?"#BE3B31":d<=30?"#D4850A":"#4A7C3F"}}>
                      {d>=0?`${d} gün`:"Geçti"}
                    </div>
                    <div style={{fontSize:9,color:"#aaa"}}>sonraki</div>
                  </div>
                </div>
                <div style={{fontSize:11,marginTop:6,color:d<=15?"#BE3B31":d<=30?"#D4850A":"#4A7C3F",fontWeight:600,background:d<=15?"#FFF0EE":d<=30?"#FFF8EC":"#F5FAF0",padding:"4px 8px",borderRadius:6}}>
                  ⏭ Sonraki: {fmt(nextStr)}{d<=30&&d>=0?` — ${d} gün kaldı!`:""}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ════════════ MAIN APP ════════════
function App(){

  useEffect(()=>{

    const load=async()=>{

      const vReports = (vrRes.data||[]).map(r=>({

      setGoats((gRes.data||[]).map(toGoat));
      setHealthRecs((hRes.data||[]).map(toHealth));
      setVaccines((vRes.data||[]).map(toVaccine));
      setReports((rRes.data||[]).map(toReport));
      setLogs((lRes.data||[]).map(toLog));
      setVaccineGroups(groups);
      setVaccineReports(vReports);
      setTreatmentDaysData((tdRes.data||[]).map(r=>({
        id:r.id, healthRecordId:r.health_record_id, goatId:r.goat_id,
        dayNumber:r.day_number, plannedDate:r.planned_date,
        done: r.done === true, doneBy:r.done_by||"", doneAt:r.done_at||""
      })));
      setBirths((bRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, motherEarTag:r.mother_ear_tag,
        birthType:r.birth_type, birthDate:r.birth_date,
        kidCount:r.kid_count||0, kids:r.kids||[],
        notes:r.notes||"", createdBy:r.created_by||"",

      })));
      setDeaths((dRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, earTag:r.ear_tag,
        deathDate:r.death_date, deathTime:r.death_time||"",
        cause:r.cause||"", notes:r.notes||"",
        createdBy:r.created_by||"", createdAt:r.created_at
      })));
      setGroupTreatments((gtRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, groupName:r.group_name,
        condition:r.condition, treatment:r.treatment||"",
        treatmentDays:r.treatment_days||0, status:r.status||"tedavi_altında",
        notes:r.notes||"", createdBy:r.created_by||"", createdAt:r.created_at
      })));
      setLoading(false);
    };
    load();
  },[showLogin]);

  const upcomingAll=useMemo(()=>{
    const list=[];
    goats.filter(g=>!g.archived).forEach(g=>{

        const next=nextVaccineDate(g.id,vd.id,vaccines);

    }

  const deleteReport=id=>{setReports(p=>p.filter(r=>r.id!==id));};
  const saveVaccineGroup=g=>{setVaccineGroups(p=>[...p,g]);};
  const updateVaccineGroup=g=>{setVaccineGroups(p=>p.map(x=>x.id===g.id?g:x));};
  const deleteVaccineGroup=id=>{setVaccineGroups(p=>p.filter(x=>x.id!==id));};
  const saveVaccineReport=r=>{setVaccineReports(p=>[r,...p]);};

  const archiveGoat=async(goatId, reason)=>{
    const g=goats.find(x=>x.id===goatId);
    const archiveReason=reason||"Manuel arşivleme — "+todayISO();
    await sb.from("goats").update({archived:true,archive_reason:archiveReason}).eq("id",goatId);
    setGoats(p=>p.map(x=>x.id===goatId?{...x,archived:true,archiveReason}:x));
    setArchiveConfirm(null);
  };

  // Swipe ile geri
  useEffect(()=>{
    let startX=0;
    const onStart = e=>{ startX=e.touches[0].clientX; };
    const onEnd = e=>{
      const dx = e.changedTouches[0].clientX - startX;
      if(dx>80 && startX<60) goBack();
    };
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchend",onEnd,{passive:true});
    return ()=>{
      document.removeEventListener("touchstart",onStart);
      document.removeEventListener("touchend",onEnd);
    };
  },[page,selBreed,selGoat]);
  const showBack = showBackBtn;
  const breed=selBreed?BREEDS.find(b=>b.id===selBreed):null;
  const goat=selGoat?goats.find(g=>g.id===selGoat):null;
  // Misafir girişi açma - UTC zaman kullan
  const openGuestAccess = async () => {
    const {error} = await sb.from("guest_access").update({
      is_open: true,
      opened_by: "Veteriner Hekim",

      expires_at: null
    }).eq("id","singleton");

  const closeGuestAccess = async () => {

  const isGuest = currentUser==="Misafir";
  const [soundPref, setSoundPref] = useState(null); // null=sorulmadı, true=açık, false=kapalı

      audio.volume = 1;
      audio.play().catch(()=>{
        // iOS'ta otomatik çalma engellenirse kullanıcı etkileşimi bekle
        const unlock = () => {
          audio.play().catch(()=>{});
          document.removeEventListener("touchstart", unlock);
          document.removeEventListener("click", unlock);

  const activeGoats=goats.filter(g=>!g.archived);

      if(data) setGuestAccess({isOpen:data.is_open, expiresAt:data.expires_at});

    loadGuest();
    loadPins();

  const handlePinSubmit = ()=>{};

    if(k==="") return;
    const next = pinInput+k;
    setPinInput(next);

    if(pinStep==="enter"){
      // PIN kontrolü
      if(userPins[person]===next){
        setPinInput("");
        // Hangi kullanıcı grubuna ait bul
        const grp = DEMO_USERS.find(u=>u.name===person||u.members.includes(person));
        const loginName = grp?.members.length===0 ? person : person; // kişi adıyla giriş
        handleLoginSuccess(loginName);
        setPinError("");
      } else {
        setPinError("Hatalı PIN! Tekrar deneyin.");
        setPinInput("");
      }
    } else if(pinStep==="create"){
      // PIN oluşturma - ilk adım
      setPinConfirm(next);
      setPinInput("");
      setPinStep("confirm");
      setPinError("");
    } else if(pinStep==="confirm"){
      // PIN onaylama
      if(pinConfirm===next){

        await sb.from("user_pins").upsert({id:"pin_"+person.replace(/\s/g,"_").replace(/\./g,""),user_name:person,pin_hash:next});
        setUserPins(p=>({...p,[person]:next}));
        setPinInput("");
        setPinStep("enter");
        setPinError("");

      } else {
        setPinError("PIN'ler eşleşmedi! Tekrar deneyin.");

        setPinStep("create");

          {/* Adım 1: Grup seç */}
          {!selUser && !selPerson && (
            <>
              <h2 style={{margin:"0 0 12px",fontSize:16,fontWeight:800,color:"#1e1e1e"}}>Kimsiniz?</h2>
              {DEMO_USERS.filter(u=>u.id!=="u7").map(u=>(
                <button key={u.id} onClick={()=>{setSelUser(u.id);setPinInput("");setPinError("");setPinStep("enter");setSelPerson(null);}}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,border:"1px solid #E0DDD4",background:"#fff",cursor:"pointer",width:"100%",marginBottom:6,textAlign:"left"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e1e1e"}}>{u.name}</div>
                    {u.members.length>0 && <div style={{fontSize:10,color:"#8c8c7e"}}>{u.members.join(" · ")}</div>}
                  </div>
                  <span style={{color:"#ccc",fontSize:16}}>›</span>
                </button>
              ))}
              {/* Misafir */}
              <button onClick={async()=>{
                if(!guestAccess.isOpen) return;

                setCurrentUser("Misafir");setShowLogin(false);
              }} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,border:`1px solid ${guestAccess.isOpen?"#4A7C3F":"#E0DDD4"}`,background:guestAccess.isOpen?"#F3F8F0":"#F9F9F6",cursor:guestAccess.isOpen?"pointer":"not-allowed",width:"100%",marginBottom:6,textAlign:"left",opacity:guestAccess.isOpen?1:.6}}>
                <span style={{fontSize:18}}>👁</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:guestAccess.isOpen?"#3D5A25":"#8c8c7e"}}>Misafir</div>
                  <div style={{fontSize:10,color:guestAccess.isOpen?"#4A7C3F":"#aaa"}}>{guestAccess.isOpen?"✅ Açık — Giriş yapabilirsiniz":"🔒 Kapalı — Veteriner Hekim açabilir"}</div>

            </>
          )}

          {/* Adım 2: Kişi seç (vardiya üyesi veya Vet/Şef direkt) */}
          {selUser && !selPerson && (()=>{
            const user = DEMO_USERS.find(u=>u.id===selUser);

            // Vet ve Şef için direkt PIN ekranına git

                    <span style={{color:"#ccc",fontSize:16}}>›</span>
                  </button>
                ))}
              </>
            );

                          return (
                            <div key={h.id} style={{...S.card,padding:"10px 12px",marginBottom:5,cursor:"pointer"}}
                              onClick={()=>setSelHealthRec(h)}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12,fontWeight:700,color:b.color,marginBottom:2}}>
                                    {g?.name ? `${g.name} ` : ""}<span style={{fontWeight:400,color:"#8c8c7e"}}>({h.goatEarTag||g?.earTag||"—"})</span>
                                  </div>
                                  <div style={{fontWeight:700,fontSize:13,color:"#1e1e1e"}}>{h.condition}</div>
                                  {h.treatment&&<div style={{fontSize:11,color:"#333",marginTop:3}}>💊 {h.treatment}</div>}
                                  {h.notes&&<div style={{fontSize:11,color:"#555",fontStyle:"italic",marginTop:2}}>📝 {h.notes}</div>}
                                  {hDays.length>0&&(
                                    <div style={{fontSize:10,background:"#E3F0DC",color:"#3D5A25",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                                      📅 {doneDays}/{hDays.length} gün · {doneDays<hDays.length?`${doneDays+1}. günde`:"Tamamlandı"}
                                    </div>
                                  )}
                                  {lastLog&&<div style={{fontSize:10,color:"#8c8c7e",marginTop:3}}>
                                    🕐 Son: {lastLog.userName} · {fmtDT(lastLog.createdAt)}
                                  </div>}
                                </div>
                                <StatusBadge status={h.status}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {healthRecs.filter(h=>!h.closed).length===0 && <Empty text="Aktif sağlık kaydı yok"/>}
          </div>
        )}

        {page==="births" && <BirthsPage births={births} currentUser={currentUser} onDelete={id=>setBirths(p=>p.filter(b=>b.id!==id))}/>}

        {page==="deaths" && <DeathsPage deaths={deaths} currentUser={currentUser}
          onDelete={(id,obj)=>{
            if(id) setDeaths(p=>p.filter(d=>d.id!==id));
            else if(obj) setDeaths(p=>[obj,...p]);
          }}/>}

        {page==="group_tx" && <GroupTreatmentsPage
          groupTreatments={groupTreatments}
          treatmentDaysData={treatmentDaysData}
          currentUser={currentUser}
          onAdd={g=>setGroupTreatments(p=>[g,...p])}
          onUpdate={g=>setGroupTreatments(p=>p.map(x=>x.id===g.id?g:x))}
          onDelete={id=>setGroupTreatments(p=>p.filter(x=>x.id!==id))}
          onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:{...d,...(d.id===day.id?day:{})}))}
        />}

        {page==="vaccines" && <GlobalVaccinePage
          vaccineGroups={vaccineGroups}
          vaccineReports={vaccineReports}
          onScheduleAdded={saveVaccineReport}
          onScheduleDeleted={id=>setVaccineReports(p=>p.filter(x=>x.id!==id))}
          onVaccineApplied={r=>{
            setVaccineReports(p=>[r,...p.filter(x=>x.id!==r.id)]);
          }}
          currentUser={currentUser}/>}

        {page==="reports" && <ReportsPage reports={reports} goats={goats} logs={logs} vaccineReports={vaccineReports} births={births} deaths={deaths} groupTreatments={groupTreatments} treatmentDaysData={treatmentDaysData} currentUser={currentUser} onDeleteReport={deleteReport}/>}

        {/* PROFILE */}
        {page==="profile" && (
          <div className="anim-fade">
            <div style={{...S.card,textAlign:"center",padding:22,marginBottom:10}}>
              <div style={{fontSize:44}}>{currentUser==="Misafir"?"👁":"👤"}</div>
              <h2 style={{margin:"4px 0 2px",fontSize:20,fontWeight:900,color:"#1e1e1e"}}>{currentUser}</h2>
              <div style={{fontSize:12,color:"#8c8c7e",marginTop:4}}>
                {currentUser==="Misafir"?"Sadece Görüntüleme":DEMO_USERS.find(u=>u.name===currentUser)?.members?.join(" · ") || (DEMO_USERS.find(u=>u.name===currentUser)?.role==="veteriner"?"Veteriner Hekim":"Şef")}
              </div>
              <div style={{marginTop:12}}>
                <button onClick={()=>{setShowLogin(true);}} style={{...S.btnOutline,color:"#BE3B31",borderColor:"#BE3B31",fontSize:13}}>🚪 Çıkış Yap</button>
              </div>
            </div>

            {/* Ses Ayarı */}
            {!isGuest && (
              <div style={{...S.card,marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:13,color:"#4A7C3F",marginBottom:8}}>🔊 Sesli Karşılama</div>
                <div style={{fontSize:12,color:"#8c8c7e",marginBottom:10}}>
                  {soundPref===true?"Her girişinizde sesli karşılama aktif ✅":soundPref===false?"Sesli karşılama kapalı 🔇":"Henüz tercih belirlenmedi"}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={async()=>{
                    setSoundPref(true);
                    await sb.from("user_preferences").upsert({id:"sp_"+currentUser.replace(/\s/g,"_"),user_name:currentUser,sound_enabled:true});
                    playWelcome(currentUser,healthRecs);
                  }} style={{...S.btnPrimary,flex:1,padding:10,fontSize:12,opacity:soundPref===true?.4:1}}>
                    🔊 Aç
                  </button>
                  <button onClick={async()=>{
                    setSoundPref(false);
                    window._welcomeAudio?.pause();
                    await sb.from("user_preferences").upsert({id:"sp_"+currentUser.replace(/\s/g,"_"),user_name:currentUser,sound_enabled:false});
                  }} style={{...S.btnOutline,flex:1,padding:10,fontSize:12,opacity:soundPref===false?.4:1}}>
                    🔇 Kapat
                  </button>
                </div>
              </div>
            )}
            {currentUser==="Veteriner Hekim" && (
              <div style={{...S.card,marginBottom:10,border:`1.5px solid ${guestAccess.isOpen?"#4A7C3F":"#E8E5DC"}`}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1e1e1e",marginBottom:8}}>👁 Misafir Erişimi</div>
                {guestAccess.isOpen ? (
                  <div>
                    <div style={{background:"#E3F0DC",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#3D5A25"}}>✅ Misafir girişi açık</div>
                      <div style={{fontSize:11,color:"#555",marginTop:2}}>Siz kapatana kadar geçerli</div>
                    </div>
                    <button onClick={closeGuestAccess} style={{...S.btnOutline,width:"100%",color:"#BE3B31",borderColor:"#BE3B31",fontSize:13}}>
                      🔒 Misafir Girişini Kapat
                    </button>
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:12,color:"#8c8c7e",marginBottom:10}}>
                      Misafir girişi şu an kapalı. Açarsanız siz kapatana kadar geçerli olur.
                    </div>
                    <button onClick={openGuestAccess} style={{...S.btnPrimary,width:"100%",fontSize:13}}>
                      🔓 Misafir Girişini Aç
                    </button>
                  </div>
                )}
              </div>
            )}

            <div style={S.card}>
              <div style={{fontWeight:700,fontSize:13,color:"#4A7C3F",marginBottom:8}}>👥 Kullanıcılar & Vardiyalar</div>
              {DEMO_USERS.filter(u=>u.id!=="u7").map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F2F0EA"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1e1e1e"}}>{u.name}{u.name===currentUser?" (siz)":""}</div>
                    {u.members && <div style={{fontSize:11,color:"#8c8c7e"}}>{u.members}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Alt Nav - ana sayfa hariç */}
      {page!=="home" && (
        <div style={S.nav}>
          {[["home","🏠","Ana"],["health","🩺","Sağlık"],["vaccines","💉","Aşı"]].map(([k,ic,l])=>(
            <button key={k} onClick={()=>navigate(k)} style={{...S.ghost,display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"6px 20px",color:page===k?"#4A7C3F":"#8c8c7e"}}>
              <span style={{fontSize:20}}>{ic}</span>
              <span style={{fontSize:10,fontWeight:page===k?700:500}}>{l}</span>
            </button>
          ))}
        </div>
      )}

    </div>
  );
}

const css=`
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:0}
  .anim-fade{animation:fadeUp .3s ease both}
  .anim-slide{animation:slideIn .3s ease both}
`;

const S={
  app:{fontFamily:"system-ui,-apple-system,sans-serif",background:"#FAFAF5",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"},
  loginWrap:{fontFamily:"system-ui,-apple-system,sans-serif",minHeight:"100vh",background:"linear-gradient(155deg,#2D4A20 0%,#4A7C3F 40%,#6B9F5B 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20},
  header:{background:"#4A7C3F",padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:200,boxShadow:"0 3px 16px rgba(74,124,63,.2)"},
  nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E8E5DC",display:"flex",justifyContent:"space-around",padding:"4px 0 6px",zIndex:200,boxShadow:"0 -2px 12px rgba(0,0,0,.04)"},
  card:{background:"#fff",borderRadius:14,padding:14,border:"1px solid #E8E5DC",boxShadow:"0 1px 3px rgba(0,0,0,.03)"},
  title:{margin:0,fontSize:18,fontWeight:800,color:"#1e1e1e"},
  input:{padding:"9px 12px",borderRadius:8,border:"1px solid #E8E5DC",fontSize:14,background:"#fff",color:"#1e1e1e",outline:"none",width:"100%",boxSizing:"border-box"},
  select:{padding:"9px 12px",borderRadius:8,border:"1px solid #E8E5DC",fontSize:14,background:"#fff",color:"#1e1e1e",outline:"none",width:"100%",boxSizing:"border-box"},
  btnPrimary:{background:"#4A7C3F",color:"#fff",border:"none",borderRadius:10,padding:"11px 16px",fontWeight:700,fontSize:14,cursor:"pointer"},
  btnOutline:{background:"transparent",color:"#4A7C3F",border:"2px solid #4A7C3F",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:14,cursor:"pointer"},
  btnSm:{border:"none",borderRadius:8,padding:"5px 10px",fontWeight:700,fontSize:11,cursor:"pointer"},
  ghost:{background:"none",border:"none",cursor:"pointer"},
  tabBtn:{flex:1,padding:"10px 0",border:"none",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"},
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
